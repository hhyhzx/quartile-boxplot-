<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>5大作文模板 · 模块化学习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; padding: 12px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  h1 { text-align: center; color: #fff; font-size: 1.3em; margin: 8px 0 2px; }
  h1 .icon { font-size: 1.3em; }
  .sub { text-align: center; color: rgba(255,255,255,0.7); font-size: 0.8em; margin-bottom: 10px; }

  /* Module tabs */
  .module-tabs {
    display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding: 2px 0; scrollbar-width: none;
  }
  .module-tabs::-webkit-scrollbar { display: none; }
  .module-tab {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 20px; font-size: 0.78em; font-weight: bold;
    border: none; cursor: pointer; font-family: inherit; white-space: nowrap;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);
    transition: all 0.2s; display: flex; align-items: center; gap: 4px;
  }
  .module-tab.active { background: #fff; color: #0f3460; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .module-tab.done { background: rgba(212,237,218,0.3); color: #d4edda; border: 1px solid rgba(212,237,218,0.5); }
  .module-tab.done.active { background: #d4edda; color: #2d6a4f; }
  .module-tab .tab-check { font-size: 0.85em; }

  .module-nav-row {
    display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px;
  }
  .nav-arrow {
    background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px;
    border-radius: 50%; font-size: 0.9em; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: background 0.2s; flex-shrink: 0;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.3); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .module-progress {
    color: rgba(255,255,255,0.8); font-size: 0.78em; text-align: center; margin-bottom: 4px;
  }
  .module-progress .prog-bar {
    display: inline-block; width: 60px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; margin: 0 6px; vertical-align: middle; overflow: hidden;
  }
  .module-progress .prog-fill {
    display: block; height: 100%; background: #4facfe; border-radius: 2px; transition: width 0.3s;
  }

  /* Card */
  .card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
  .card h2 { font-size: 1.05em; color: #1a1a2e; margin-bottom: 2px; }
  .card .tag { display: inline-block; background: #f6d365; color: #1a1a2e; padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; margin-bottom: 8px; }
  .card .goal { font-size: 0.85em; color: #666; margin-bottom: 10px; line-height: 1.6; }

  /* Memory step tabs */
  .mem-steps { display: flex; gap: 6px; margin-bottom: 12px; }
  .mem-step-tab {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 0.7em; font-weight: bold;
    background: #eee; color: #999; transition: all 0.2s;
  }
  .mem-step-tab.active { background: #0f3460; color: #fff; }
  .mem-step-tab.done { background: #d4edda; color: #2d6a4f; }

  /* Model card */
  .model-card {
    background: linear-gradient(135deg, #fff5f5, #fff8e1); border: 2px solid #f6d365; border-radius: 14px;
    padding: 14px; margin-bottom: 10px; text-align: center;
  }
  .model-card .cn { font-size: 0.9em; color: #333; margin-bottom: 8px; line-height: 1.6; }
  .model-card .en {
    font-size: 1em; font-family: 'Times New Roman', serif; color: #1a1a2e;
    line-height: 1.8; padding: 8px; background: rgba(255,255,255,0.7); border-radius: 8px;
  }
  .model-card .en .hl { background: #f6d365; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

  /* Speaker button */
  .speak-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid #0f3460;
    background: #fff; cursor: pointer; font-size: 0.9em; transition: all 0.15s;
    vertical-align: middle; margin-left: 6px; flex-shrink: 0;
  }
  .speak-btn:active { background: #e8f0fe; }
  .speak-btn.speaking { background: #0f3460; animation: speakPulse 0.6s ease-in-out infinite; }
  @keyframes speakPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(15,52,96,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(15,52,96,0); }
  }

  /* Mic button */
  .mic-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid #e63946;
    background: #fff; cursor: pointer; font-size: 0.9em; transition: all 0.15s;
    vertical-align: middle; margin-left: 4px; flex-shrink: 0;
  }
  .mic-btn:active { background: #ffe0e0; }
  .mic-btn.listening {
    background: #e63946; color: #fff;
    animation: micPulse 0.8s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(230,57,70,0); }
  }
  .mic-btn.success { background: #2d6a4f; border-color: #2d6a4f; color: #fff; animation: none; }
  .mic-result {
    text-align: center; margin-top: 8px; padding: 8px; border-radius: 10px;
    font-size: 0.8em; line-height: 1.6; min-height: 20px;
  }
  .mic-result.listening { background: #fff5f5; color: #e63946; }
  .mic-result.match { background: #d4edda; color: #2d6a4f; }
  .mic-result.nomatch { background: #fff8e1; color: #b8680a; }
  .mic-result .match-word { color: #2d6a4f; font-weight: bold; }
  .mic-result .miss-word { color: #e63946; text-decoration: line-through; }

  /* Role badge */
  .role-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7em;
    font-weight: bold; margin-right: 6px; vertical-align: middle;
  }
  .role-badge.open { background: #d0e8ff; color: #1d5fa3; }
  .role-badge.body { background: #ffe8cc; color: #b8680a; }
  .role-badge.close { background: #d4edda; color: #1e6f3f; }
  .role-badge.pro { background: #e8d0ff; color: #6b1fa3; }
  .role-badge.opp { background: #ffe0e0; color: #b81a1a; }

  /* Pattern frame display */
  .pattern-box {
    background: linear-gradient(135deg, #e8f0fe, #f0e8ff); border: 2px solid #4facfe;
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; text-align: center;
  }
  .pattern-box .label { font-size: 0.72em; color: #4facfe; font-weight: bold; margin-bottom: 4px; }
  .pattern-box .frame {
    font-size: 1em; font-family: 'Times New Roman', serif; color: #0f3460;
    line-height: 1.8; font-weight: bold;
  }
  .pattern-box .frame .hl { background: #ffe082; padding: 2px 5px; border-radius: 4px; }

  /* Chunk display */
  .chunks { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
  .chunk {
    background: #fff; border: 2px solid #f6d365; border-radius: 8px; padding: 6px 10px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; font-weight: bold;
  }

  /* Fill-in-blank */
  .fb-sentence {
    font-size: 1em; font-family: 'Times New Roman', serif; line-height: 2.2; padding: 10px;
    background: #fff; border-radius: 8px; margin: 6px 0;
  }
  .fb-blank {
    display: inline-block; min-width: 60px; border-bottom: 3px solid #e63946; margin: 0 3px;
    text-align: center; padding: 2px 4px; color: transparent; cursor: default;
  }
  .fb-blank.reveal { color: #e63946; border-color: #52b788; font-weight: bold; }

  .word-bank { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .wb-word {
    background: #e8f0fe; border: 2px solid #0f3460; border-radius: 8px; padding: 5px 10px;
    font-size: 0.8em; cursor: pointer; user-select: none; transition: all 0.15s;
  }
  .wb-word:hover { background: #d0e0ff; }
  .wb-word.used { opacity: 0.3; pointer-events: none; }

  /* Dictation */
  .dict-area { margin: 10px 0; }
  .dict-cn { font-size: 0.95em; color: #333; text-align: center; margin-bottom: 8px; line-height: 1.6; }
  .dict-hint { font-size: 0.75em; color: #999; text-align: center; margin-bottom: 6px; }
  .dict-hint span { background: #e8f0fe; padding: 2px 8px; border-radius: 10px; margin: 2px; display: inline-block; }

  /* Compare view */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
  .compare-col { border-radius: 10px; padding: 10px; font-size: 0.8em; line-height: 1.7; }
  .compare-col.my { background: #e8f0fe; font-family: 'Times New Roman', serif; }
  .compare-col.model { background: #d4edda; font-family: 'Times New Roman', serif; }
  .compare-col h5 { font-size: 0.85em; margin-bottom: 4px; }

  /* Score */
  .score-display {
    text-align: center; font-size: 1.5em; margin: 6px 0;
  }

  /* Textarea */
  textarea {
    width: 100%; height: 100px; border: 2px solid #ddd; border-radius: 10px; padding: 12px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; line-height: 1.7; resize: vertical; outline: none;
  }
  textarea:focus { border-color: #0f3460; }

  /* Handwriting trigger button */
  .hw-trigger {
    display: block; width: 100%; padding: 32px 20px; margin: 8px 0;
    background: linear-gradient(135deg, #faf8f5, #f0ebe0);
    border: 2px dashed #c0b090; border-radius: 14px;
    cursor: pointer; text-align: center; font-family: inherit;
    transition: all 0.2s;
  }
  .hw-trigger:hover { border-color: #8b7355; background: linear-gradient(135deg, #f5f0e8, #e8dcc8); }
  .hw-trigger .hw-trigger-icon { font-size: 2.5em; display: block; margin-bottom: 6px; }
  .hw-trigger .hw-trigger-label { font-size: 0.95em; color: #5c4a2e; font-weight: bold; }
  .hw-trigger .hw-trigger-hint { font-size: 0.7em; color: #999; margin-top: 4px; }
  .hw-toggle-row {
    text-align: center; margin-top: 6px;
  }
  .hw-toggle-row button {
    background: none; border: none; color: #0f3460; font-size: 0.72em; cursor: pointer;
    text-decoration: underline; font-family: inherit;
  }

  /* Full-screen handwriting overlay */
  .hw-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; height: 100dvh;
    z-index: 2000; background: #f5f0e8; display: flex; flex-direction: column;
    animation: hwSlideUp 0.25s ease-out;
  }
  @keyframes hwSlideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .hw-overlay-top {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 12px; background: #fff; border-bottom: 1px solid #e0d8c8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-shrink: 0;
  }
  .hw-overlay-top .cn-prompt {
    flex: 1; font-size: 0.88em; color: #333; text-align: center; line-height: 1.6;
    padding: 4px 0;
  }
  .hw-overlay-close {
    background: #f0f0f0; border: none; font-size: 1.2em; color: #666;
    cursor: pointer; padding: 6px 12px; border-radius: 20px; flex-shrink: 0;
  }
  .hw-overlay-hint {
    text-align: center; font-size: 0.72em; color: #999; padding: 4px;
    background: #fff; flex-shrink: 0;
  }
  .hw-overlay-hint span {
    background: #e8f0fe; padding: 2px 8px; border-radius: 10px; margin: 2px; display: inline-block;
  }
  .hw-overlay-canvas-wrap {
    flex: 1; margin: 6px 8px; background: #fff; border-radius: 12px;
    overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    touch-action: none; min-height: 0;
  }
  .hw-overlay-canvas {
    display: block; width: 100%; height: 100%; cursor: crosshair;
  }
  .hw-overlay-tools {
    display: flex; gap: 8px; align-items: center; justify-content: center;
    padding: 8px 10px 12px; background: #fff; border-top: 1px solid #eee;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .hw-overlay-tools .hw-btn {
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 20px;
    padding: 7px 14px; font-size: 0.78em; cursor: pointer;
    font-family: inherit; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .hw-overlay-tools .hw-btn:active { background: #e0e0e0; }
  .hw-overlay-tools .hw-btn.done {
    background: #0f3460; color: #fff; border-color: #0f3460; font-size: 0.9em; padding: 10px 28px; font-weight: bold;
  }
  .hw-overlay-tools .hw-btn.done:active { background: #0a2240; }
  .hw-overlay-tools .pen-size-label { font-size: 0.7em; color: #666; }
  .hw-overlay-tools input[type=range] { width: 70px; accent-color: #0f3460; }

  /* Buttons */
  .btn {
    display: inline-block; padding: 10px 22px; border-radius: 24px; font-size: 0.82em;
    font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #0f3460; color: #fff; }
  .btn-success { background: #2d6a4f; color: #fff; }
  .btn-outline { background: #fff; color: #0f3460; border: 2px solid #0f3460; }
  .btn-sm { padding: 5px 14px; font-size: 0.7em; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* Review section */
  .review-item {
    background: #f8f9fa; border-radius: 10px; padding: 10px; margin-bottom: 8px;
    border-left: 4px solid #f6d365;
  }
  .review-item .r-cn { font-size: 0.82em; color: #555; margin-bottom: 4px; }
  .review-item .r-en { font-size: 0.82em; font-family: 'Times New Roman', serif; color: #1a1a2e; }

  /* Responsive */
  /* Toast notification */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #e63946; color: #fff; padding: 12px 24px; border-radius: 24px;
    font-size: 0.85em; font-weight: bold; z-index: 3000;
    box-shadow: 0 4px 16px rgba(230,57,70,0.4);
    animation: toastIn 0.3s ease-out, toastOut 0.3s 2.0s ease-out forwards;
    pointer-events: none; max-width: 90%; text-align: center;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes fall {
    to { transform: translateY(100vh); opacity: 0; }
  }

  @media (max-width: 400px) {
    .card { padding: 12px; }
    .compare { grid-template-columns: 1fr; }
    .mem-steps { gap: 3px; }
    .mem-step-tab { font-size: 0.62em; padding: 6px 2px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><span class="icon">📝</span> 5大作文模板万能句</h1>
  <div class="sub">5个模块完整学习 · 逐个攻破 · 建议信 / 议论文 / 记叙文 / 人物 / 通知</div>

  <div class="module-tabs" id="moduleTabs"></div>
  <div class="module-progress" id="moduleProgress"></div>
  <div class="module-nav-row">
    <button class="nav-arrow" id="btnPrevModule" title="上一个模块">◀</button>
    <button class="nav-arrow" id="btnNextModule" title="下一个模块">▶</button>
  </div>

  <div class="card" id="taskCard">
    <h2 id="taskTitle">Day 1 · 模板1 · 建议信（上）</h2>
    <div id="taskContent"></div>
  </div>
</div>

<script>
// ==================== 10-DAY PLAN DATA ====================
// Each sentence: cn (中文), model (英文), chunks (分块记忆), blanks (挖空词), role (首段/主体/结尾等)

const MODULES = [
  // ===== Module 1: 建议信 =====
  {
    name: '建议信', icon: '💌',
    goal: `学会建议信的完整结构：回应来信 → 分条给建议 → 结尾祝福。掌握 I'm glad to receive your letter / you'd better / why not / I hope / As long as 等核心句型。`,
    sentences: [
      { cn: '很高兴收到你的来信，询问如何学好英语的建议。',
        pattern: "I'm sorry to hear that... / I'm glad to receive your letter...",
        model: "I'm glad to receive your letter asking for advice on how to learn English well.",
        chunks: ["I'm glad to receive your letter", "asking for advice on", "how to learn English well."],
        blanks: ['glad', 'receive', 'advice', 'learn'],
        role: '首段' },
      { cn: '首先，你最好听英文歌。其次，为什么不读一些简单的英文故事呢？',
        pattern: "First of all, you'd better... / Secondly, why not...? / What's more, ...",
        model: "First of all, you'd better listen to English songs. Secondly, why not read some simple English stories?",
        chunks: ["First of all,", "you'd better listen to English songs.", "Secondly, why not", "read some simple English stories?"],
        blanks: ['First of all', 'better', 'Secondly', 'simple'],
        role: '主体' },
      { cn: '希望我的建议对你有帮助。',
        pattern: 'I hope my advice will be helpful.',
        model: 'I hope my advice will be helpful.',
        chunks: ['I hope', 'my advice', 'will be helpful.'],
        blanks: ['hope', 'advice', 'helpful'],
        role: '结尾' },
      { cn: '只要你坚持练习，你一定会进步的。',
        pattern: 'As long as you..., you will...',
        model: 'As long as you keep practicing, you will make progress.',
        chunks: ['As long as you keep practicing,', 'you will make progress.'],
        blanks: ['As long as', 'keep', 'practicing', 'progress'],
        role: '结尾' },
    ],
  },

  // ===== Module 2: 议论文 =====
  {
    name: '议论文', icon: '⚖️',
    goal: `学会议论文的完整结构：引出话题 → 陈述正方观点 → 陈述反方观点 → 表达自己的观点。掌握 These days / Some people think / However, others argue / As far as I'm concerned 等核心句型。`,
    sentences: [
      { cn: '如今，学生是否应该使用手机已经成为一个热门话题。',
        pattern: 'These days, ... has become a hot topic.',
        model: 'These days, whether students should use mobile phones has become a hot topic.',
        chunks: ['These days,', 'whether students should use mobile phones', 'has become a hot topic.'],
        blanks: ['These days', 'whether', 'mobile phones', 'hot topic'],
        role: '首段' },
      { cn: '有些人认为手机能帮助学生快速查阅信息。',
        pattern: 'Some people think that... They believe that...',
        model: 'Some people think that mobile phones help students look up information quickly.',
        chunks: ['Some people think that', 'mobile phones help students', 'look up information quickly.'],
        blanks: ['think', 'help', 'look up', 'quickly'],
        role: '正方' },
      { cn: '但也有人争辩说，手机会分散学生的学习注意力。',
        pattern: 'However, others hold the opposite view. They argue that...',
        model: 'However, others argue that mobile phones may distract students from their study.',
        chunks: ['However, others argue that', 'mobile phones may distract students', 'from their study.'],
        blanks: ['However', 'argue', 'distract', 'study'],
        role: '反方' },
      { cn: '就我而言，学生可以使用手机，但必须在严格规定下。',
        pattern: "In my opinion / As far as I'm concerned, I agree with...",
        model: "As far as I'm concerned, students can use phones, but only under strict rules.",
        chunks: ["As far as I'm concerned,", "students can use phones,", "but only under strict rules."],
        blanks: ['As far as', 'concerned', 'phones', 'strict rules'],
        role: '己见' },
    ],
  },

  // ===== Module 3: 记叙文 =====
  {
    name: '记叙文', icon: '📖',
    goal: '学会记叙文的完整结构：引出经历 → 按时间顺序描述经过 → 总结感悟。掌握 I still remember / At first...Then...After that...Finally / I learned a lot from 等核心句型。',
    sentences: [
      { cn: '我仍然记得我第一次参加篮球比赛的那一天。',
        pattern: 'Last..., I had an unforgettable experience. / I still remember the day when...',
        model: 'I still remember the day when I took part in a basketball game for the first time.',
        chunks: ['I still remember the day', 'when I took part in a basketball game', 'for the first time.'],
        blanks: ['remember', 'took part in', 'basketball', 'first time'],
        role: '首段' },
      { cn: '一开始我很紧张。然后，队友们鼓励了我。之后我越打越好，最后我们赢了！',
        pattern: 'At first, ... Then, ... After that, ... Finally, ...',
        model: 'At first, I was very nervous. Then, my teammates encouraged me. After that, I played better and better. Finally, we won!',
        chunks: ['At first, I was very nervous.', 'Then, my teammates encouraged me.', 'After that, I played better and better.', 'Finally, we won!'],
        blanks: ['At first', 'nervous', 'encouraged', 'Finally'],
        role: '主体' },
      { cn: '我从这次经历中学到了很多——团队合作可以让不可能变为可能。',
        pattern: 'I learned a lot from this experience. / This is really a day to remember.',

const STORAGE_KEY = 'essay_checkin_modules_v2';
let state = loadState();

function defaultState() {
  return {
    completed: {},    // module index → timestamp
    sentences: {},    // module index → [typed answers]
    sentenceDone: {}, // module index → { sentence index: true }
    handwriting: {},  // module index → [dataURLs]
    readCounts: {},   // module index → { sentence index: count }
  };
}

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== RENDER ====================
let activeModule = 0;
let activeStepIndex = 0;
const STEP_LABELS = ['📖 背诵记忆', '🧩 填空练习', '✍️ 默写输出', '✅ 核对答案'];
const TOTAL_MODULES = 5;

// ==================== MODULE NAVIGATION ====================
function goToModule(index) {
  if (index < 0 || index >= TOTAL_MODULES) return;
  activeModule = index;
  activeStepIndex = 0;
  window._curSentIdx = 0;
  renderModuleNav();
  renderModule();
}

function renderModuleNav() {
  // Render module tabs
  let tabsHTML = '';
  MODULES.forEach((m, i) => {
    let cls = 'module-tab';
    if (i === activeModule) cls += ' active';
    if (state.completed[i]) cls += ' done';
    tabsHTML += `<button class="${cls}" onclick="goToModule(${i})">`;
    if (state.completed[i]) tabsHTML += `<span class="tab-check">✅</span>`;
    tabsHTML += `${m.icon} ${m.name}</button>`;
  });
  document.getElementById('moduleTabs').innerHTML = tabsHTML;

  // Scroll active tab into view
  setTimeout(() => {
    const tabs = document.querySelectorAll('.module-tab');
    if (tabs[activeModule]) tabs[activeModule].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 100);

  // Progress
  const m = MODULES[activeModule];
  const total = m.sentences.length;
  const doneCount = state.sentenceDone[activeModule] ? Object.keys(state.sentenceDone[activeModule]).length : 0;
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('moduleProgress').innerHTML = `
    第 ${activeModule + 1}/${TOTAL_MODULES} 模块 · 句型 ${doneCount}/${total}
    <span class="prog-bar"><span class="prog-fill" style="width:${pct}%"></span></span>
    ${pct}%
  `;

  // Nav arrows
  document.getElementById('btnPrevModule').disabled = activeModule <= 0;
  document.getElementById('btnNextModule').disabled = activeModule >= TOTAL_MODULES - 1;
}

// ==================== MODULE RENDERING ====================
function renderModule() {
  const mod = MODULES[activeModule];
  const done = !!state.completed[activeModule];
  const card = document.getElementById('taskCard');
  document.getElementById('taskTitle').textContent = mod.icon + ' ' + mod.name + ' · 模块 ' + (activeModule + 1);

  let html = `<div class="tag">${mod.name}</div>`;
  html += `<div class="goal">🎯 ${mod.goal}</div>`;

  if (done) {
    html += doneView(activeModule);
  } else {
    html += renderSentenceStudy(activeModule, mod);
  }

  document.getElementById('taskContent').innerHTML = html;
  bindEvents(activeModule, mod);
}

function doneView(index) {
  const mod = MODULES[index];
  const hwData = state.handwriting && state.handwriting[index];
  let h = `<div style="background:#d4edda;border-radius:12px;padding:14px;text-align:center;color:#2d6a4f;">
    ✅ 模块完成！${new Date(state.completed[index]).toLocaleString('zh-CN')}
    <br><button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="delete state.completed[${index}];delete state.sentences[${index}];delete state.sentenceDone[${index}];delete state.handwriting[${index}];saveState();goToModule(${index})">🔁 重新练习</button>
  </div>`;
  const sentences = mod.sentences;
  // Show handwriting images
  if (hwData && hwData.some(img => img)) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">✍️ 我的手写：</h4>`;
    sentences.forEach((s, si) => {
      if (hwData[si]) {
        h += `<div style="margin-bottom:6px;"><span style="color:#999;font-size:0.7em;">${si+1}. ${roleBadge(s.role)}${s.cn}</span><br><img src="${hwData[si]}" style="max-width:100%;border:1px solid #ddd;border-radius:6px;background:#fff;" alt="handwriting ${si+1}"></div>`;
      }
    });
    h += `</div>`;
  }
  // Show typed answers
  if (state.sentences[index]) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">📝 我的默写：</h4>`;
    sentences.forEach((s, si) => {
      const usr = (state.sentences[index] || [])[si] || '';
      if (usr) {
        h += `<div style="margin-bottom:6px;"><span style="color:#999;font-size:0.7em;">${si+1}. ${roleBadge(s.role)}${s.cn}</span><br><span style="font-family:'Times New Roman',serif;font-size:0.78em;">${esc(usr)}</span></div>`;
      }
    });
    h += `</div>`;
  }
  return h;
}

// ==================== SENTENCE STUDY ====================
function renderSentenceStudy(idx, mod) {
  let h = '';

  // Step tabs
  h += `<div class="mem-steps">`;
  STEP_LABELS.forEach((l, si) => {
    let cls = 'mem-step-tab';
    if (si === activeStepIndex) cls += ' active';
    if (si < activeStepIndex) cls += ' done';
    h += `<div class="${cls}" onclick="activeStepIndex=${si};renderModule()">${l}</div>`;
  });
  h += `</div>`;

  const totalS = mod.sentences.length;
  const curIdx = window._curSentIdx || 0;
  const s = mod.sentences[curIdx];

  h += `<div style="text-align:center;font-size:0.75em;color:#999;margin-bottom:8px;">
    共 ${totalS} 个句型 | ${roleBadge(s.role)} 当前第 ${curIdx + 1} 个
  </div>`;

  h += `<div id="sentenceWorkArea">`;

  if (activeStepIndex === 0) {
    h += renderMemorize(s);
  } else if (activeStepIndex === 1) {
    h += renderFillBlank(s, idx, curIdx);
  } else if (activeStepIndex === 2) {
    h += renderDictation(s, idx, curIdx);
  } else if (activeStepIndex === 3) {
    h += renderCompare(s, idx, curIdx);
  }

  h += `</div>`;

  // Navigation
  h += `<div class="btn-row">`;
  // Show sentence completion status
  if (state.sentenceDone[activeModule] && state.sentenceDone[activeModule][curIdx]) {
    h += `<div style="text-align:center;color:#2d6a4f;font-size:0.75em;margin-top:4px;">✅ 本句已完成</div>`;
  }
  if (curIdx > 0) {
    h += `<button class="btn btn-outline btn-sm" onclick="_curSentIdx=${curIdx-1};activeStepIndex=0;renderModule()">⬅ 上一句</button>`;
  }
  const hasSR = !!((window.SpeechRecognition || window.webkitSpeechRecognition));
  const step0Locked = activeStepIndex === 0 && hasSR && getReadCount() < 3;
  h += `<button class="btn btn-primary btn-sm" onclick="advanceStep(${idx}, ${curIdx})" id="btnAdvance"${step0Locked ? ' disabled' : ''}>${
    activeStepIndex === 3 ? '➡ 下一句' : (step0Locked ? '🔒 需开口读3遍' : '下一步 ➡')
  }</button>`;
  h += `</div>`;

  return h;
}

function renderMemorize(s) {
  let h = '';
  // Pattern box — show the structural frame first
  if (s.pattern) {
    h += `<div class="pattern-box">
      <div class="label">📐 句型框架（先记住这个结构！）</div>

  const hasSR = !!((window.SpeechRecognition || window.webkitSpeechRecognition));
  h += `<div class="model-card">
    <div class="cn">${roleBadge(s.role)}🇨🇳 ${s.cn}</div>
    <div class="en">${highlightPhrase(esc(s.model))}<button class="speak-btn" data-text="${esc(s.model)}" onclick="event.stopPropagation();speakSentence(this)" title="听范读">🔊</button><button class="mic-btn" id="micBtn" onclick="event.stopPropagation();startSpeechRecog()" title="开口读">🎤</button></div>
  </div>`;
  if (s.chunks) {
    h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">📦 分块记忆：</div>`;
    h += `<div class="chunks">`;

    h += `<p style="text-align:center;font-size:0.72em;color:#e63946;margin-top:4px;">⚠️ 您的浏览器不支持语音识别，请用 Chrome 打开。</p>`;
  } else {
    h += `<p style="text-align:center;font-size:0.73em;color:#999;margin-top:4px;">👆 先点🔊听范读，再点🎤开口朗读，需匹配3次</p>`;
  }
  return h;
}

function renderFillBlank(s, index, curIdx) {
  let words = s.blanks || [];
  let sentence = s.model;
  let fbHtml = sentence;
  words.forEach(w => {
    fbHtml = fbHtml.replace(new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b'), `<span class="fb-blank" data-word="${esc(w)}">____</span>`);
  });

  let h = `<div class="model-card"><div class="cn">${roleBadge(s.role)}🇨🇳 ${s.cn}</div></div>`;
  h += `<div class="fb-sentence">${fbHtml}</div>`;
  h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">👇 点击下方单词填入空格</div>`;
  let shuffled = [...words].sort(() => Math.random() - 0.5);
  h += `<div class="word-bank" id="wordBank">`;
  shuffled.forEach(w => {
    h += `<span class="wb-word" data-word="${esc(w)}" onclick="fillBlank(this)">${esc(w)}</span>`;
  });
  h += `</div>`;
  h += `<div style="text-align:center;font-size:0.7em;color:#999;margin-top:2px;" id="fbProgress">请填写所有 <b>${words.length}</b> 个空格（剩余 <b id="fbRemain">${words.length}</b> 个）</div>`;
  h += `<div style="text-align:center;margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="revealAllBlanks()">👀 显示答案</button></div>`;
  return h;
}

function fillBlank(el) {
  const word = el.dataset.word;
  const blanks = document.querySelectorAll('.fb-blank:not(.reveal)');
  for (let b of blanks) {
    if (b.dataset.word === word && !b.classList.contains('reveal')) {
      b.textContent = word;
      b.classList.add('reveal');
      el.classList.add('used');
      // Update progress
      const remain = document.querySelectorAll('.fb-blank:not(.reveal)').length;
      const remainEl = document.getElementById('fbRemain');
      if (remainEl) remainEl.textContent = remain;
      if (remain === 0) {
        setTimeout(() => { if (confirm('全部填完！太棒了！✅ 准备进入默写了吗？')) advanceStepDirect(); }, 300);
      }
      return;
    }
  }
}

function revealAllBlanks() {
  document.querySelectorAll('.fb-blank').forEach(b => {
    b.textContent = b.dataset.word;
    b.classList.add('reveal');
  });
  document.querySelectorAll('.wb-word').forEach(w => w.classList.add('used'));
}

function renderCompare(s, index, curIdx) {
  const userAnswer = (state.sentences[activeModule] || [])[curIdx] || '';

    </div>`;
    return h;
  }

  // Text comparison (fallback)
  let h = `<div class="compare">
    <div class="compare-col my">
      <h5>✏️ 我的默写</h5>
      <div>${esc(userAnswer) || '<em style="color:#999;">（未填写）</em>'}</div>
    </div>

      <h5>📋 标准答案 ${roleBadge(s.role)}</h5>

    </div>
  </div>`;
  if (userAnswer) {
    const score = simpleScore(userAnswer, s.model);
    h += `<div class="score-display">${score >= 80 ? '🎉' : score >= 50 ? '👍' : '💪'} 相似度: ${score}%</div>`;
    if (score >= 90) h += `<p style="text-align:center;color:#2d6a4f;font-size:0.85em;">完美！你已经记住这个句子了！</p>`;
    else if (score >= 60) h += `<p style="text-align:center;color:#f6a623;font-size:0.85em;">还不错！再练习一下拼写吧。</p>`;
    else h += `<p style="text-align:center;color:#e63946;font-size:0.85em;">差距较大，建议回第一步重新背诵。</p>`;
  }
  return h;
}

function simpleScore(user, model) {
  const uWords = user.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  const mWords = model.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  if (uWords.length === 0) return 0;
  let match = 0;
  const mSet = new Set(mWords);
  uWords.forEach(w => { if (mSet.has(w)) match++; });
  return Math.round((match / Math.max(uWords.length, mWords.length)) * 100);
}

function highlightPhrase(text) {
  const phrases = [
    "I'm glad to", 'receive your letter', 'asking for advice', 'how to learn',
    "you'd better", 'why not', 'First of all', 'As long as',
    'These days', 'has become a hot topic', 'Some people think that',
    'However, others argue that', 'As far as', "I'm concerned",
    'I still remember the day when', 'took part in', 'for the first time',
    'At first', 'After that', 'Finally', 'learned a lot',
    'teamwork can make', 'the impossible possible',
    'The person I admire most', 'not only', 'but also',
    'What impresses me most', 'warm-hearted',
    'stayed up', 'take care of', 'seriously ill',
    'has a great influence on me', 'It is she who',
    "I'm writing to tell you", 'To begin with',
    'Please remember to', 'Looking forward to',
  ];
  let result = text;
  phrases.forEach(p => {
    const escaped = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="hl">$1</span>');
  });
  return result;
}

function advanceStep(index, curIdx) {
  const mod = MODULES[activeModule];
  const maxSent = mod.sentences.length;

  // === PASS GATE: check current step before advancing ===

  // Step 0 (memorize): must speak 3 times
  if (activeStepIndex === 0) {
    const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    const cnt = getReadCount();
    if (hasSR && cnt < 3) {
      showToast('请先点击🎤开口朗读3遍，匹配成功即可通过');
      return;
    }
  }

  // Step 1 (fill-blank): all blanks must be filled
  if (activeStepIndex === 1) {
    const unfilled = document.querySelectorAll('.fb-blank:not(.reveal)');
    if (unfilled.length > 0) {
      showToast('请先完成所有填空再进入下一步');
      return;
    }
  }

  // Step 2 (dictation): must have content
  if (activeStepIndex === 2) {
    // Handwriting: overlay still open, close it (triggers save and re-call)
    if (document.getElementById('hwOverlay')) {
      closeHWOverlay(true);
      return;
    }
    // Check handwriting data
    const hasHW = state.handwriting && state.handwriting[activeModule] && state.handwriting[activeModule][curIdx];
    // Check typing data
    const slot = document.getElementById('textAreaSlot');
    const ta = document.getElementById('dictText');
    const slotVisible = slot && slot.style.display !== 'none';
    const hasTyped = slotVisible && ta && ta.value.trim();

    if (hasHW) {
      // Already saved via overlay - proceed
    } else if (hasTyped) {
      if (!state.sentences[activeModule]) state.sentences[activeModule] = [];
      state.sentences[activeModule][curIdx] = ta.value.trim();
      saveState();
    } else if (slotVisible) {
      // Typing mode visible but empty
      showToast('请先输入英文句子或切换到全屏手写');
      return;
    } else {
      // Handwriting trigger visible but not used
      showToast('请先点击"开始手写"写句子，或切换到打字模式');
      return;
    }
  }

  // Step 3 (compare): mark sentence as done & check score
  if (activeStepIndex === 3) {
    const userAnswer = (state.sentences[activeModule] || [])[curIdx] || '';
    const hasHW = state.handwriting && state.handwriting[activeModule] && state.handwriting[activeModule][curIdx];
    if (!hasHW && userAnswer) {
      const s = mod.sentences[curIdx];
      const score = simpleScore(userAnswer, s.model);
      if (score < 50) {
        showToast('相似度低于50%，建议返回重新背诵或默写');
        return;
      }
    }
    // Mark sentence as done
    if (!state.sentenceDone[activeModule]) state.sentenceDone[activeModule] = {};
    state.sentenceDone[activeModule][curIdx] = true;
    saveState();

    // Check if all sentences in module are done
    const allDone = mod.sentences.every((_, si) => state.sentenceDone[activeModule] && state.sentenceDone[activeModule][si]);
    if (allDone) {
      completeModule(activeModule);
      return;
    }
  }

  if (activeStepIndex < 3) {
    activeStepIndex++;
    renderModule();
  } else {
    if (curIdx < maxSent - 1) {
      window._curSentIdx = curIdx + 1;
      activeStepIndex = 0;
      renderModule();
    } else {
      // Loop back to first undone sentence
      const firstUndone = mod.sentences.findIndex((_, si) => !state.sentenceDone[activeModule] || !state.sentenceDone[activeModule][si]);
      window._curSentIdx = firstUndone >= 0 ? firstUndone : 0;
      activeStepIndex = 0;
      renderModule();
    }
  }
}

function advanceStepDirect() {
  activeStepIndex++;
  renderModule();
}

// ==================== UTILS ====================
function roleBadge(role) {
  if (!role) return '';
  const clsMap = { '首段': 'open', '主体': 'body', '结尾': 'close', '正方': 'pro', '反方': 'opp', '己见': 'pro', '开头': 'open', '经过': 'body', '性格': 'pro', '事迹': 'body', '影响': 'close', '内容': 'body', '注意事项': 'close' };
  const cls = clsMap[role] || 'body';
  return `<span class="role-badge ${cls}">${role}</span>`;
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function speakSentence(btnEl) {
  if (!('speechSynthesis' in window)) return;
  const synth = window.speechSynthesis;

  // Decode HTML entities from data-text attribute
  const rawText = btnEl.getAttribute('data-text');
  const txt = document.createElement('textarea');
  txt.innerHTML = rawText;
  const text = txt.value;
  if (!text) return;

  // Remove speaking state from other buttons
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));

  // Cancel any ongoing speech before starting new one (enables replay on re-click)
  synth.cancel();

  // Track read count
  const curIdx = window._curSentIdx || 0;
  if (!state.readCounts) state.readCounts = {};
  if (!state.readCounts[activeModule]) state.readCounts[activeModule] = {};
  const prev = state.readCounts[activeModule][curIdx] || 0;
  state.readCounts[activeModule][curIdx] = prev + 1;
  saveState();
  updateReadCounter();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-GB';
  utter.rate = 0.85;
  utter.pitch = 1;

  btnEl.classList.add('speaking');
  utter.onend = () => btnEl.classList.remove('speaking');
  utter.onerror = () => btnEl.classList.remove('speaking');

  // Speak immediately — must be synchronous from user click for iOS
  synth.speak(utter);
}

// ==================== SPEECH RECOGNITION ====================
let srRecognition = null;

function startSpeechRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('浏览器不支持语音识别，请用Chrome打开'); return; }

  // Stop if already listening
  if (srRecognition) {
    srRecognition.stop();
    srRecognition = null;
    return;
  }

  const micBtn = document.getElementById('micBtn');
  const resultEl = document.getElementById('micResult');

  const recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  srRecognition = recognition;

  if (micBtn) micBtn.classList.add('listening');
  if (resultEl) {
    resultEl.className = 'mic-result listening';
    resultEl.innerHTML = '🎤 正在聆听...请大声朗读英文句子';
  }

  let finalText = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    const display = finalText + (interim ? ' <i style="color:#999;">' + interim + '</i>' : '');
    if (resultEl) {
      resultEl.className = 'mic-result listening';
      resultEl.innerHTML = '🎤 ' + (display || '正在聆听...');
    }
  };

  recognition.onend = () => {
    srRecognition = null;
    if (micBtn) micBtn.classList.remove('listening');
    if (finalText && resultEl) {
      checkSpokenSentence(finalText.trim(), resultEl, micBtn);
    } else if (resultEl) {
      resultEl.className = 'mic-result nomatch';
      resultEl.innerHTML = '⚠️ 未识别到语音，请再试一次';
    }
  };

  recognition.onerror = (e) => {
    srRecognition = null;
    if (micBtn) micBtn.classList.remove('listening');
    if (resultEl) {
      resultEl.className = 'mic-result nomatch';
      resultEl.innerHTML = '⚠️ ' + (e.error === 'no-speech' ? '未检测到声音，请大声朗读' : '识别出错，请重试');
    }
  };

  recognition.start();
}

function checkSpokenSentence(spoken, resultEl, micBtn) {
  const mod = MODULES[activeModule];
  const curIdx = window._curSentIdx || 0;
  const model = mod.sentences[curIdx].model;

  // Compare words
  const sWords = spoken.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  const mWords = model.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  const mSet = new Set(mWords);
  let matched = 0;
  sWords.forEach(w => { if (mSet.has(w)) matched++; });
  const pct = mWords.length > 0 ? Math.round(matched / mWords.length * 100) : 0;

  // Build highlighted comparison
  let compareHTML = '';
  mWords.forEach(w => {
    if (sWords.includes(w)) {
      compareHTML += '<span class="match-word">' + w + '</span> ';
    } else {
      compareHTML += '<span class="miss-word">' + w + '</span> ';
    }
  });

  if (pct >= 50) {
    // Count as successful read
    if (!state.readCounts) state.readCounts = {};
    if (!state.readCounts[activeModule]) state.readCounts[activeModule] = {};
    const prev = state.readCounts[activeModule][curIdx] || 0;
    state.readCounts[activeModule][curIdx] = prev + 1;
    saveState();

    if (resultEl) {
      resultEl.className = 'mic-result match';
      resultEl.innerHTML = '✅ 匹配 ' + pct + '% — 你说的是：<i>' + esc(spoken) + '</i><br><small>标准对比：' + compareHTML + '</small>';
    }
    if (micBtn) {
      micBtn.classList.add('success');
      setTimeout(() => micBtn.classList.remove('success'), 1500);
    }
    updateReadCounter();

    const cnt = getReadCount();
    if (cnt >= 3 && resultEl) {
      resultEl.innerHTML += '<br><b>🎉 已完成3次朗读，可以进入下一步！</b>';
    }
  } else {
    if (resultEl) {
      resultEl.className = 'mic-result nomatch';
      resultEl.innerHTML = '❌ 匹配 ' + pct + '%（需≥50%）— 你说的是：<i>' + esc(spoken) + '</i><br><small>标准对比：' + compareHTML + '</small><br>请再试一次';
    }
  }

  updateReadCounter();
}

function getReadCount() {
  const curIdx = window._curSentIdx || 0;
  return (state.readCounts && state.readCounts[activeModule] && state.readCounts[activeModule][curIdx]) || 0;
}

function updateReadCounter() {
  const el = document.getElementById('readCounter');
  const btn = document.getElementById('btnAdvance');
  if (!el) return;
  const cnt = getReadCount();
  const need = 3;
  if (cnt >= need) {
    el.innerHTML = '<span style="color:#2d6a4f;">✅ 已读 ' + cnt + '/' + need + ' 遍</span>';
    if (btn) { btn.disabled = false; btn.textContent = '下一步 ➡'; }
  } else {
    el.innerHTML = '🔊 已听 <b>' + cnt + '</b>/<b>' + need + '</b> 遍（需听3遍）';
    if (btn) { btn.disabled = true; btn.textContent = '🔒 需听3遍'; }
  }
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 2500);
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;pointer-events:none;z-index:999;top:0;left:0;width:100%;height:100%;';
  document.body.appendChild(container);
  const colors = ['#f6d365','#fda085','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#ff6b6b'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-${Math.random()*40+10}px;width:10px;height:10px;border-radius:3px;background:${colors[Math.floor(Math.random()*colors.length)]};animation:fall ${Math.random()*1.2+1.2}s ease-out forwards;animation-delay:${Math.random()*0.8}s;`;
    container.appendChild(p);
  }
  setTimeout(() => container.remove(), 3000);
}

// ==================== HANDWRITING OVERLAY ====================
let hwUndoStack = [];
let hwDrawing = false;
let hwPenColor = '#1a1a2e';
let hwPenSize = 3;
let hwOverlayCanvas = null;
let hwOverlayCtx = null;

function openHWOverlay() {
  const ctx = window._hwCtx;
  if (!ctx) return;
  const { s } = ctx;

  // Prevent body scroll
  document.body.style.overflow = 'hidden';

  const overlay = document.createElement('div');
  overlay.className = 'hw-overlay';
  overlay.id = 'hwOverlay';

  let hintHTML = '';
  if (s.chunks) {
    hintHTML = '<div class="hw-overlay-hint">💡 提示词：';
    s.chunks.forEach(c => {
      const firstWord = c.trim().split(/\s+/)[0].replace(/[,.]/g, '');
      hintHTML += `<span>${firstWord}</span>`;
    });
    hintHTML += '</div>';
  }

  overlay.innerHTML = `
    <div class="hw-overlay-top">
      <div class="cn-prompt"><b>${esc(s.cn)}</b></div>
      <button class="hw-overlay-close" id="hwOverlayClose">✕</button>
    </div>
    ${hintHTML}
    <div class="hw-overlay-canvas-wrap" id="hwOverlayWrap">
      <canvas class="hw-overlay-canvas" id="hwOverlayCanvas"></canvas>
    </div>
    <div class="hw-overlay-tools">
      <button class="hw-btn" id="hwUndo">↩ 撤销</button>
      <button class="hw-btn" id="hwClear">🗑 清除</button>
      <span class="pen-size-label">笔粗</span>
      <input type="range" id="hwPenSize" min="1" max="8" value="3" step="0.5">
      <span class="pen-size-label"><span id="hwSizeLabel">3</span>px</span>
      <button class="hw-btn" id="hwPenColor" style="width:26px;height:26px;border-radius:50%;background:#1a1a2e;padding:0;min-width:0;"></button>
      <button class="hw-btn done" id="hwDone">✅ 完成</button>
    </div>
  `;

  document.body.appendChild(overlay);

  // Init canvas after DOM insertion
  requestAnimationFrame(() => initHWCanvas());
}

function initHWCanvas() {
  const canvas = document.getElementById('hwOverlayCanvas');
  if (!canvas) return;
  hwOverlayCanvas = canvas;
  hwUndoStack = [];

  const wrap = document.getElementById('hwOverlayWrap');
  const dpr = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  hwOverlayCtx = ctx;
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  drawPaperLines(ctx, w, h);
  saveSnapshot(canvas);

  canvas.addEventListener('pointerdown', onHWPointerDown);
  canvas.addEventListener('pointermove', onHWPointerMove);
  canvas.addEventListener('pointerup', onHWPointerUp);
  canvas.addEventListener('pointerleave', onHWPointerUp);
  canvas.addEventListener('pointercancel', onHWPointerUp);

  // Toolbar
  document.getElementById('hwUndo').onclick = () => undoStroke(canvas);
  document.getElementById('hwClear').onclick = () => {
    clearCanvas(canvas);
    saveSnapshot(canvas);
  };
  document.getElementById('hwPenSize').oninput = (e) => {
    hwPenSize = parseFloat(e.target.value);
    document.getElementById('hwSizeLabel').textContent = hwPenSize;
  };
  document.getElementById('hwPenColor').onclick = function() {
    const colors = ['#1a1a2e', '#e63946', '#2d6a4f', '#1d5fa3'];
    const cur = colors.indexOf(hwPenColor);
    hwPenColor = colors[(cur + 1) % colors.length];
    this.style.background = hwPenColor;
  };
  document.getElementById('hwDone').onclick = () => closeHWOverlay(true);
  document.getElementById('hwOverlayClose').onclick = () => closeHWOverlay(false);
}

function onHWPointerDown(e) {
  hwDrawing = true;
  saveSnapshot(hwOverlayCanvas);
  const pos = getCanvasPos(hwOverlayCanvas, e);
  hwOverlayCtx.beginPath();
  hwOverlayCtx.moveTo(pos.x, pos.y);
}

function onHWPointerMove(e) {
  if (!hwDrawing) return;
  e.preventDefault();
  const pos = getCanvasPos(hwOverlayCanvas, e);
  hwOverlayCtx.strokeStyle = hwPenColor;
  hwOverlayCtx.lineWidth = hwPenSize;
  hwOverlayCtx.lineTo(pos.x, pos.y);
  hwOverlayCtx.stroke();
  hwOverlayCtx.beginPath();
  hwOverlayCtx.moveTo(pos.x, pos.y);
}

function onHWPointerUp() { hwDrawing = false; }

function closeHWOverlay(save) {
  if (save && hwOverlayCanvas && isEmptyCanvas(hwOverlayCanvas)) {
    showToast('请先在纸上写出英文句子再点完成 ✍️');
    return;
  }

  document.body.style.overflow = '';

  if (save && hwOverlayCanvas) {
    const ctx = window._hwCtx;
    if (ctx) {
      if (!state.handwriting) state.handwriting = {};
      if (!state.handwriting[activeModule]) state.handwriting[activeModule] = [];
      state.handwriting[activeModule][ctx.curIdx] = hwOverlayCanvas.toDataURL('image/png');
      saveState();
    }
  }

  // Clean up event listeners
  if (hwOverlayCanvas) {
    hwOverlayCanvas.removeEventListener('pointerdown', onHWPointerDown);
    hwOverlayCanvas.removeEventListener('pointermove', onHWPointerMove);
    hwOverlayCanvas.removeEventListener('pointerup', onHWPointerUp);
    hwOverlayCanvas.removeEventListener('pointerleave', onHWPointerUp);
    hwOverlayCanvas.removeEventListener('pointercancel', onHWPointerUp);
  }

  const overlay = document.getElementById('hwOverlay');
  if (overlay) overlay.remove();
  hwOverlayCanvas = null;
  hwOverlayCtx = null;
  hwUndoStack = [];

  // Advance to compare step if saved
  if (save && window._hwCtx) {
    const ctx = window._hwCtx;
    advanceStep(activeModule, ctx.curIdx);
  }
}

function getCanvasPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  return {
    x: (e.clientX - rect.left) * (canvas.width / dpr / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / dpr / rect.height),
  };
}

function drawPaperLines(ctx, w, h) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  // Light blue horizontal lines
  ctx.strokeStyle = '#c8e0f0';
  ctx.lineWidth = 1;
  const lineSpacing = 32;
  for (let y = lineSpacing; y < h; y += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  // Red margin line
  ctx.strokeStyle = '#f4a0a0';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(32, 0);
  ctx.lineTo(32, h);
  ctx.stroke();
}

function saveSnapshot(canvas) {
  hwUndoStack.push(canvas.toDataURL());
  if (hwUndoStack.length > 40) hwUndoStack.shift();
}

function undoStroke(canvas) {
  if (hwUndoStack.length <= 1) return;
  hwUndoStack.pop();
  const img = new Image();
  img.onload = () => {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.scale(dpr, dpr);
    ctx.drawImage(img, 0, 0, w, h);
  };
  img.src = hwUndoStack[hwUndoStack.length - 1];
}

function clearCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(dpr, dpr);
  drawPaperLines(ctx, w, h);
}

function isEmptyCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 0; i < pixelData.length; i += 4) {
    const r = pixelData[i], g = pixelData[i+1], b = pixelData[i+2];
    if (r === 255 && g === 255 && b === 255) continue;
    if (r >= 190 && g >= 220 && b >= 235) continue;
    if (r >= 235 && g >= 150 && b >= 150 && r <= 250) continue;
    return false;
  }
  return true;
}

// ==================== EVENT BINDING ====================
function bindEvents(index, mod) {
  if (state.completed[index]) return;

  const peekBtn = document.getElementById('btnPeek');
  if (peekBtn) peekBtn.onclick = () => { document.getElementById('peekArea').style.display = 'block'; };
  const checkBtn = document.getElementById('btnCheckDict');
  if (checkBtn) checkBtn.onclick = () => { advanceStep(index, window._curSentIdx || 0); };

  const startHW = document.getElementById('btnStartHW');
  if (startHW) startHW.onclick = () => openHWOverlay();

  const toggleBtn = document.getElementById('btnSwitchTyping');
  if (toggleBtn) {
    toggleBtn.onclick = () => {
      const trigger = document.getElementById('btnStartHW');
      const slot = document.getElementById('textAreaSlot');
      const btn = document.getElementById('btnSwitchTyping');
      if (slot.style.display === 'none') {
        if (trigger) trigger.style.display = 'none';
        slot.style.display = 'block';
        btn.innerHTML = '✍️ 切换到手写模式';
      } else {
        if (trigger) trigger.style.display = 'block';
        slot.style.display = 'none';
        btn.innerHTML = '⌨ 切换到打字模式';
      }
    };
  }

  // Restore previous handwriting thumbnail
  if (activeStepIndex === 2) {
    const curIdx = window._curSentIdx || 0;
    const hwImg = state.handwriting && state.handwriting[activeModule] ? state.handwriting[activeModule][curIdx] : null;
    if (hwImg) {
      const trigger = document.getElementById('btnStartHW');
      if (trigger) {
        trigger.innerHTML = `<span style="display:block;font-size:0.75em;color:#999;margin-bottom:4px;">已手写（点击重新书写）</span>
          <img src="${hwImg}" style="max-width:100%;max-height:120px;border:1px solid #ddd;border-radius:6px;background:#fff;" alt="previous">`;
        trigger.style.padding = '12px 20px';
      }
    }
  }
}

function completeModule(index) {
  state.completed[index] = Date.now();
  // Mark all sentences done
  const mod = MODULES[index];
  if (!state.sentenceDone[index]) state.sentenceDone[index] = {};
  mod.sentences.forEach((_, si) => { state.sentenceDone[index][si] = true; });
  saveState();
  hwUndoStack = [];
  renderModule();
  renderModuleNav();
  launchConfetti();
}

// ==================== INIT ====================
function init() {
  window._curSentIdx = 0;
  document.getElementById('btnPrevModule').onclick = () => goToModule(activeModule - 1);
  document.getElementById('btnNextModule').onclick = () => goToModule(activeModule + 1);
  // Pre-warm speech synthesis engine for mobile
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged = null; };
  }
  goToModule(0);
}
init();
