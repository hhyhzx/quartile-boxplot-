<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>英语作文打卡 · 14天挑战</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; padding: 12px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  h1 { text-align: center; color: #fff; font-size: 1.3em; margin: 8px 0 2px; }
  h1 .icon { font-size: 1.3em; }
  .sub { text-align: center; color: rgba(255,255,255,0.7); font-size: 0.8em; margin-bottom: 12px; }

  /* Progress bar */
  .progress-wrap { background: rgba(255,255,255,0.12); border-radius: 20px; height: 22px; margin-bottom: 12px; overflow: hidden; position: relative; }
  .progress-fill { background: linear-gradient(90deg, #f6d365, #fda085); height: 100%; border-radius: 20px; transition: width 0.5s; width: 0%; }
  .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.75em; font-weight: bold; color: #fff; }

  /* Calendar grid */
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px; }
  .day-box {
    aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; position: relative; font-weight: bold;
    border: 2px solid transparent; font-size: 0.65em;
  }
  .day-box.locked { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); cursor: not-allowed; }
  .day-box.today { background: #fff; color: #0f3460; border-color: #f6d365; box-shadow: 0 0 14px rgba(246,211,101,0.5); animation: pulse 2s infinite; }
  .day-box.done { background: #2d6a4f; color: #fff; border-color: #52b788; }
  .day-box.done::after { content: "✓"; font-size: 1.1em; }
  .day-box .day-num { font-size: 0.85em; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px rgba(246,211,101,0.4); } 50% { box-shadow: 0 0 22px rgba(246,211,101,0.8); } }

  /* Main card */
  .card {
    background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }
  .card h2 { font-size: 1.1em; color: #1a1a2e; margin-bottom: 4px; }
  .card .tag { display: inline-block; background: #f6d365; color: #1a1a2e; padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; margin-bottom: 10px; }
  .card .goal { font-size: 0.85em; color: #666; margin-bottom: 12px; line-height: 1.6; }

  /* Task steps */
  .step { background: #f8f9fa; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #0f3460; }
  .step h4 { font-size: 0.85em; color: #0f3460; margin-bottom: 6px; }
  .step p { font-size: 0.8em; color: #555; line-height: 1.6; }
  .step .en { color: #1a1a2e; font-style: italic; }

  /* Fill-in-blank */
  .fill-blank { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; align-items: center; }
  .fill-blank .word {
    background: #e8f0fe; border: 2px dashed #0f3460; border-radius: 8px; padding: 6px 12px;
    font-size: 0.8em; cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .fill-blank .word.used { background: #d4edda; border-color: #52b788; }
  .fill-blank .blank-slot {
    display: inline-block; min-width: 80px; border-bottom: 2px solid #e63946; margin: 0 4px;
    text-align: center; padding: 2px 8px; font-size: 0.8em; transition: all 0.2s;
  }
  .fill-blank .blank-slot.filled { border-color: #52b788; color: #2d6a4f; font-weight: bold; }

  /* Textarea */
  textarea {
    width: 100%; height: 140px; border: 2px solid #ddd; border-radius: 10px; padding: 12px;
    font-size: 0.85em; font-family: 'Times New Roman', serif; line-height: 1.7; resize: vertical;
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: #0f3460; }

  /* Buttons */
  .btn {
    display: inline-block; padding: 10px 24px; border-radius: 24px; font-size: 0.85em;
    font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #0f3460; color: #fff; }
  .btn-primary:hover { background: #1a4a8a; }
  .btn-success { background: #2d6a4f; color: #fff; }
  .btn-success:hover { background: #40916c; }
  .btn-outline { background: #fff; color: #0f3460; border: 2px solid #0f3460; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

  /* Stars */
  .stars { font-size: 1.5em; letter-spacing: 4px; text-align: center; margin: 8px 0; }

  /* Confetti overlay */
  .confetti { position: fixed; pointer-events: none; z-index: 999; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 3px;
    animation: fall 1.5s ease-out forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Hint */
  .hint {
    background: #fff3cd; border-radius: 8px; padding: 8px 12px; margin-top: 8px;
    font-size: 0.75em; color: #856404; display: none;
  }
  .hint.show { display: block; }

  /* Responsive */
  @media (max-width: 400px) {
    .calendar { gap: 3px; }
    .day-box { border-radius: 8px; font-size: 0.55em; }
    .card { padding: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><span class="icon">📝</span> 英语作文打卡挑战</h1>
  <div class="sub">14天 · 从句子到作文 · 每天进步一点点</div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progressBar"></div>
    <div class="progress-text" id="progressLabel">0/14 完成</div>
  </div>

  <!-- Stars -->
  <div class="stars" id="stars">☆☆☆☆☆☆☆☆☆☆☆☆☆☆</div>

  <!-- Calendar -->
  <div class="calendar" id="calendar"></div>

  <!-- Task card -->
  <div class="card" id="taskCard">
    <h2 id="taskTitle">👆 点击上方日期开始学习</h2>
    <div id="taskContent">
      <p class="goal" style="text-align:center;color:#999;padding:30px 0;">
        选择一个可以访问的日期<br>（灰色=已锁定  金色=今天可学  ✓=已完成）
      </p>
    </div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti" id="confetti"></div>

<script>
// ==================== DATA: 14-Day Plan ====================

const DAYS = [
  { // Day 1
    topic: '建议信句型（一）',
    template: '模板1 · 建议信',
    goal: '学会3个提建议的万能句型，能用中文提示写出英文句子。',
    type: 'sentences',
    sentences: [
      { cn: '如果我是你，我会和父母谈谈，告诉他们我的感受。', hint: 'If I were you, I would...' },
      { cn: '对你来说，每天锻炼是很重要的。', hint: 'It is important for you to...' },
      { cn: '经常锻炼是减轻压力的好方法。', hint: 'Doing sth. is a good way to...' },
    ],
    memory: '今天你学会了：If I were you, I would... / It is important for you to... / Doing sth. is a good way to...',
  },
  { // Day 2
    topic: '建议信句型（二）',
    template: '模板1 · 建议信',
    goal: '继续学习2个建议句型，并用5句话组成完整的建议信。',
    type: 'essay',
    sentences: [
      { cn: '你应该每天按时到校。', hint: 'You are supposed to...' },
      { cn: '我强烈建议你多喝水，因为这对你的健康有益。', hint: 'I strongly advise you to...because...' },
    ],
    essayPrompt: '你的朋友Tom最近总是生病。请用今天和昨天的5个句型，给他写一封简短的建议信（5-6句话）。',
    essayHint: '开头打招呼 → If I were you... → It is important for you to... → You are supposed to... → I strongly advise you to... → 结尾祝福',
  },
  { // Day 3
    topic: '议论文句型（一）',
    template: '模板2 · 观点对比',
    goal: '学会议论文开头和正反方表达的3个句型。',
    type: 'sentences',
    sentences: [
      { cn: '最近，学生是否应该使用手机已经成为一个热门话题。', hint: 'These days, whether...has become a hot topic.' },
      { cn: '有些人认为手机能帮助学生快速查阅信息。', hint: 'Some people think that...' },
      { cn: '但也有人争辩说，手机会分散学生的注意力。', hint: 'However, others argue that...' },
    ],
    memory: '今天你学会了：These days, whether...has become a hot topic. / Some people think that... / However, others argue that...',
  },
  { // Day 4
    topic: '议论文句型（二）',
    template: '模板2 · 观点对比',
    goal: '学习表达自己观点的句型，并完成一段完整的议论文。',
    type: 'essay',
    sentences: [
      { cn: '就我而言，学生可以使用手机，但必须在严格规定下。', hint: 'As far as I\'m concerned, ...' },
      { cn: '我不同意的原因是，太多作业占用了我们锻炼的时间。', hint: 'The reason why I disagree is that...' },
    ],
    essayPrompt: '请以"中学生是否应该做家务"为题，写一段议论文（5-6句话），包含正反观点和你的看法。',
    essayHint: '开头引入话题 → Some people think... → However, others argue... → As far as I\'m concerned... → The reason why...is that...',
  },
  { // Day 5
    topic: '记叙文句型',
    template: '模板3 · 经历描述',
    goal: '学会写经历的时间顺序句型，用5句话描述一件事。',
    type: 'essay',
    sentences: [
      { cn: '当我放学走路回家时，我看到一个小女孩在路边哭泣。', hint: 'While I was walking home, I saw...' },
      { cn: '我正要放弃，这时我最好的朋友出现了。', hint: 'I was about to give up when...' },
    ],
    essayPrompt: '请描写一件你帮助别人的小事（5-6句话）。用While I was doing...和I was about to...when...来串联时间线。',
    essayHint: '开头交代时间地点 → While I was... → I saw... → I decided to... → 结尾写感受',
  },
  { // Day 6
    topic: '人物描写句型',
    template: '模板4 · 人物介绍',
    goal: '学会描写人物的句型，介绍你心中的榜样。',
    type: 'sentences',
    sentences: [
      { cn: '我最敬佩的人是我妈妈，她不仅是一位勤奋的护士，也是一位慈爱的母亲。', hint: 'The person I admire most is..., who is not only...but also...' },
      { cn: '我敬佩我爸爸，不是因为他的钱，而是因为他的善良和正直。', hint: 'I admire him not because of..., but because of...' },
      { cn: '没有英语老师的鼓励，我不可能取得这么大的进步。', hint: 'Without her encouragement, I couldn\'t have...' },
    ],
    memory: '今天你学会了：The person I admire most is...who is... / I admire...not because of...but because of... / Without...I couldn\'t have...',
  },
  { // Day 7
    topic: '活动通知句型',
    template: '模板5 · 计划通知',
    goal: '学会写活动通知，完整描述一次活动安排。',
    type: 'essay',
    sentences: [
      { cn: '我们将在周五下午在学校图书馆举办一次图书分享活动。', hint: 'We are going to hold a...activity on...in...' },
      { cn: '欢迎任何对中国传统文化感兴趣的人加入我们。', hint: 'Anyone who is interested in...is welcome.' },
    ],
    essayPrompt: '请为班级写一则周末志愿者活动的通知（5-6句话）。包含：时间地点、活动内容、注意事项。',
    essayHint: 'I\'m writing to tell you about... → We are going to... → There will be... → Please remember to... → Looking forward to...',
  },
  { // Day 8
    topic: '完整作文：建议信',
    template: '复习模板1',
    goal: '用Day 1-2学的句型，独立完成一封完整的建议信。',
    type: 'essay',
    sentences: [],
    essayPrompt: '你的朋友李明最近学习压力很大，总是熬夜。请写一封80词左右的建议信，给他3条具体建议。',
    essayHint: 'Dear Li Ming, → I\'m sorry to hear that... → First of all, you\'d better... → Secondly, why not...? → What\'s more, it\'s important to... → I hope my advice will be helpful. → Yours, [Your name]',
  },
  { // Day 9
    topic: '完整作文：志愿者经历',
    template: '复习模板3',
    goal: '独立完成一篇关于志愿者经历的记叙文。',
    type: 'essay',
    sentences: [],
    essayPrompt: '请以"A Meaningful Volunteer Experience"为题，写一篇80词左右的短文。描述你参加的一次志愿者活动。',
    essayHint: 'Last Saturday, I volunteered to... → We arrived at... → Some of us...while others... → Seeing the smiles on their faces, I felt... → From this experience, I learned that...',
  },
  { // Day 10
    topic: '完整作文：家务劳动',
    template: '复习模板2',
    goal: '独立完成一篇关于家务劳动的议论文。',
    type: 'essay',
    sentences: [],
    essayPrompt: '请以"Should Middle School Students Do Chores?"为题，写一篇80词左右的短文，包含正反观点和你的看法。',
    essayHint: 'These days...has become a hot topic. → Some people think that... → However, others argue that... → In my opinion... → First...Second... → All in all...',
  },
  { // Day 11
    topic: '完整作文：难忘经历',
    template: '复习模板3',
    goal: '独立完成一篇关于难忘经历的记叙文。',
    type: 'essay',
    sentences: [],
    essayPrompt: '请以"An Unforgettable Experience"为题，写一篇80词左右的短文。',
    essayHint: 'I still remember the day when... → At first... → Then... → After that... → Finally... → I learned a lot from this experience.',
  },
  { // Day 12
    topic: '完整作文：我心中的英雄',
    template: '复习模板4',
    goal: '独立完成一篇人物描写作文。',
    type: 'essay',
    sentences: [],
    essayPrompt: '请以"My Hero"为题，写一篇80词左右的短文，介绍你心中的英雄。',
    essayHint: 'The person I admire most is..., who is not only...but also... → She/He is a...person. → She/He once... → She/He has a great influence on me. → I hope that one day...',
  },
  { // Day 13
    topic: '完整作文：我的暑假计划',
    template: '复习模板5',
    goal: '独立完成一篇假期计划作文。',
    type: 'essay',
    sentences: [],
    essayPrompt: '期末考试后你打算如何度过暑假？请以"My Summer Vacation Plan"为题，写一篇80词左右的短文。',
    essayHint: 'The summer vacation is around the corner. → First of all, I plan to... → After that, I will... → Besides, I have decided to... → All in all, I think...',
  },
  { // Day 14
    topic: '终极挑战：综合写作',
    template: '全部模板总复习',
    goal: '从两个题目中任选一个，独立完成一篇100词左右的作文，综合运用所学句型。',
    type: 'essay',
    sentences: [],
    essayPrompt: '选题1：给一年后的自己写一封信，说说现在的烦恼和对未来的期待。\n\n选题2：你认为什么样的人是"成功的人"？请描述并举例说明。\n\n要求：至少使用3种从句（定语从句/状语从句/名词性从句），2个倒装或强调句型。',
    essayHint: '仔细审题 → 选好话题 → 列3-4个要点 → 用上学过的句型 → 检查拼写和语法 → 大声朗读一遍',
  },
];

// ==================== STATE ====================
const STORAGE_KEY = 'essay_checkin_v3';
let state = loadState();

function defaultState() {
  return {
    completed: {},    // { dayIndex: timestamp }
    sentences: {},    // { dayIndex: [user answers] }
    essays: {},       // { dayIndex: "essay text" }
    fills: {},        // { dayIndex: { stepIndex: [filled words] } }
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== RENDER ====================
let activeDay = null;

function getTodayIndex() {
  // Find the first uncompleted day, or today based on progress
  for (let i = 0; i < 14; i++) {
    if (!state.completed[i]) return i;
  }
  return 13; // all done
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const today = getTodayIndex();
  for (let i = 0; i < 14; i++) {
    const box = document.createElement('div');
    box.className = 'day-box';
    const isDone = !!state.completed[i];
    const isLocked = i > today && !isDone;
    const isToday = i === today && !isDone;

    if (isDone) box.classList.add('done');
    else if (isToday) box.classList.add('today');
    else if (isLocked) box.classList.add('locked');

    box.innerHTML = `<span class="day-num">D${i + 1}</span><span>${isDone ? '' : (isLocked ? '🔒' : '')}</span>`;
    if (!isLocked || isDone) {
      box.onclick = () => selectDay(i);
    }
    cal.appendChild(box);
  }
}

function updateProgress() {
  const count = Object.keys(state.completed).length;
  document.getElementById('progressBar').style.width = (count / 14 * 100) + '%';
  document.getElementById('progressLabel').textContent = count + '/14 完成';
  // Stars
  let starStr = '';
  for (let i = 0; i < 14; i++) {
    starStr += state.completed[i] ? '⭐' : '☆';
  }
  document.getElementById('stars').textContent = starStr;
}

function selectDay(index) {
  activeDay = index;
  renderCalendar();
  renderTask(index);
}

function renderTask(index) {
  const day = DAYS[index];
  const isDone = !!state.completed[index];
  const card = document.getElementById('taskCard');

  document.getElementById('taskTitle').textContent = 'Day ' + (index + 1) + ' · ' + day.topic;

  let html = `<div class="tag">${day.template}</div>`;
  html += `<div class="goal">🎯 ${day.goal}</div>`;

  if (isDone) {
    html += `<div style="background:#d4edda;border-radius:10px;padding:14px;text-align:center;color:#2d6a4f;">
      ✅ 本日任务已完成！完成于 ${new Date(state.completed[index]).toLocaleString('zh-CN')}
      <br><br><button class="btn btn-outline" onclick="selectDay(${index})" style="font-size:0.8em;">🔁 重新练习</button>
    </div>`;
    if (state.essays[index]) {
      html += `<div style="margin-top:10px;background:#f8f9fa;border-radius:10px;padding:12px;">
        <h4 style="font-size:0.85em;color:#0f3460;">📄 你的作文：</h4>
        <p style="font-size:0.82em;white-space:pre-wrap;line-height:1.8;font-family:'Times New Roman',serif;">${escapeHTML(state.essays[index])}</p>
      </div>`;
    }
  } else {
    if (day.type === 'sentences') {
      // Sentence practice
      html += renderSentencePractice(index, day);
    } else if (day.type === 'essay') {
      // Full essay writing
      html += renderEssayPractice(index, day);
    }
  }

  document.getElementById('taskContent').innerHTML = html;

  // Bind events
  bindEvents(index, day);
}

function renderSentencePractice(index, day) {
  let html = '';
  day.sentences.forEach((s, si) => {
    html += `<div class="step">
      <h4>📌 句型 ${si + 1}</h4>
      <p>🇨🇳 中文提示：${s.cn}</p>
      <p style="color:#999;font-size:0.75em;">💡 提示词：${s.hint}</p>
      <textarea id="sent_${si}" placeholder="在这里写出你的英文句子..."></textarea>
    </div>`;
  });
  if (day.memory) {
    html += `<div class="step" style="background:#e8f0fe;border-left-color:#0f3460;">
      <h4>🧠 今日背诵</h4><p class="en">${day.memory}</p>
    </div>`;
  }
  html += `<div class="btn-row">
    <button class="btn btn-primary" id="btnCheckSent">✅ 提交并打卡</button>
    <button class="btn btn-outline" id="btnHint">💡 看答案提示</button>
  </div>`;
  html += `<div class="hint" id="hintBox"></div>`;
  return html;
}

function renderEssayPractice(index, day) {
  let html = '';
  // Sentence warm-up if any
  if (day.sentences && day.sentences.length > 0) {
    day.sentences.forEach((s, si) => {
      html += `<div class="step">
        <h4>📌 热身句型 ${si + 1}</h4>
        <p>${s.cn}</p>
        <p style="color:#999;font-size:0.75em;">💡 ${s.hint}</p>
        <textarea id="sent_${si}" placeholder="写出英文句子..." style="height:60px;"></textarea>
      </div>`;
    });
  }

  html += `<div class="step" style="background:#fff8e1;border-left-color:#f6d365;">
    <h4>✍️ 今日作文</h4>
    <p style="white-space:pre-wrap;">${day.essayPrompt}</p>
  </div>`;
  html += `<textarea id="essayText" placeholder="在这里写你的作文...&#10;&#10;提示：${day.essayHint}"></textarea>`;

  html += `<div class="btn-row">
    <button class="btn btn-success" id="btnSubmitEssay">✅ 提交并打卡</button>
    <button class="btn btn-outline" id="btnEssayHint">💡 写作框架</button>
  </div>`;
  html += `<div class="hint" id="hintBox">📋 ${day.essayHint}</div>`;

  return html;
}

function bindEvents(index, day) {
  if (state.completed[index]) return;

  if (day.type === 'sentences') {
    document.getElementById('btnCheckSent').onclick = () => checkSentences(index, day);
    document.getElementById('btnHint').onclick = () => showSentenceHints(day);
  } else if (day.type === 'essay') {
    document.getElementById('btnSubmitEssay').onclick = () => submitEssay(index, day);
    const hintBtn = document.getElementById('btnEssayHint');
    if (hintBtn) {
      hintBtn.onclick = () => {
        const box = document.getElementById('hintBox');
        box.classList.toggle('show');
      };
    }
  }
}

// Sentence check
function checkSentences(index, day) {
  let allFilled = true;
  day.sentences.forEach((s, si) => {
    const ta = document.getElementById('sent_' + si);
    if (!ta || !ta.value.trim()) allFilled = false;
  });

  if (!allFilled) {
    if (!confirm('还有句子没写完，确定要提交吗？')) return;
  }

  // Save sentences
  const answers = day.sentences.map((s, si) => {
    const ta = document.getElementById('sent_' + si);
    return ta ? ta.value.trim() : '';
  });
  state.sentences[index] = answers;

  completeDay(index);
}

function showSentenceHints(day) {
  const box = document.getElementById('hintBox');
  let hints = day.sentences.map((s, i) => {
    const partial = s.hint.replace('...', '________');
    return `${i+1}. ${s.cn}<br>  ➜ ${partial}`;
  });
  box.innerHTML = hints.join('<br><br>');
  box.classList.toggle('show');
}

// Essay submit
function submitEssay(index, day) {
  const ta = document.getElementById('essayText');
  if (!ta || !ta.value.trim()) {
    alert('请先写完作文再提交哦！📝');
    return;
  }
  // Save any warm-up sentences
  if (day.sentences && day.sentences.length > 0) {
    const answers = day.sentences.map((s, si) => {
      const st = document.getElementById('sent_' + si);
      return st ? st.value.trim() : '';
    });
    state.sentences[index] = answers;
  }
  state.essays[index] = ta.value.trim();
  completeDay(index);
}

function completeDay(index) {
  state.completed[index] = Date.now();
  saveState();
  updateProgress();
  renderCalendar();
  renderTask(index);
  launchConfetti();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#f6d365','#fda085','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#ff6b6b'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 40 + 10) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.animationDuration = (Math.random() * 1.2 + 1.2) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 2500);
  }
}

// ==================== UTILS ====================
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== INIT ====================
function init() {
  updateProgress();
  renderCalendar();
  // Auto-select today
  const today = getTodayIndex();
  selectDay(today);
}

init();
</script>
