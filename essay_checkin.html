<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>英语作文打卡 · 14天挑战</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; padding: 12px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  h1 { text-align: center; color: #fff; font-size: 1.3em; margin: 8px 0 2px; }
  h1 .icon { font-size: 1.3em; }
  .sub { text-align: center; color: rgba(255,255,255,0.7); font-size: 0.8em; margin-bottom: 10px; }

  /* Progress */
  .progress-wrap { background: rgba(255,255,255,0.12); border-radius: 20px; height: 22px; margin-bottom: 10px; overflow: hidden; position: relative; }
  .progress-fill { background: linear-gradient(90deg, #f6d365, #fda085); height: 100%; border-radius: 20px; transition: width 0.5s; width: 0%; }
  .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.75em; font-weight: bold; color: #fff; }

  .stars { font-size: 1.2em; letter-spacing: 3px; text-align: center; margin: 6px 0; }

  /* Calendar */
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 12px; }
  .day-box {
    aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-weight: bold; border: 2px solid transparent; font-size: 0.6em;
  }
  .day-box.locked { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); cursor: not-allowed; }
  .day-box.today { background: #fff; color: #0f3460; border-color: #f6d365; box-shadow: 0 0 14px rgba(246,211,101,0.5); animation: pulse 2s infinite; }
  .day-box.done { background: #2d6a4f; color: #fff; border-color: #52b788; }
  .day-box.done::after { content: "✓"; font-size: 1em; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 10px rgba(246,211,101,0.4); } 50% { box-shadow: 0 0 22px rgba(246,211,101,0.8); } }

  /* Card */
  .card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
  .card h2 { font-size: 1.05em; color: #1a1a2e; margin-bottom: 2px; }
  .card .tag { display: inline-block; background: #f6d365; color: #1a1a2e; padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; margin-bottom: 8px; }
  .card .goal { font-size: 0.85em; color: #666; margin-bottom: 10px; line-height: 1.6; }

  /* Memory step tabs */
  .mem-steps { display: flex; gap: 6px; margin-bottom: 12px; }
  .mem-step-tab {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 0.7em; font-weight: bold;
    background: #eee; color: #999; transition: all 0.2s;
  }
  .mem-step-tab.active { background: #0f3460; color: #fff; }
  .mem-step-tab.done { background: #d4edda; color: #2d6a4f; }

  /* Memory card - model sentence display */
  .model-card {
    background: linear-gradient(135deg, #fff5f5, #fff8e1); border: 2px solid #f6d365; border-radius: 14px;
    padding: 14px; margin-bottom: 10px; text-align: center;
  }
  .model-card .cn { font-size: 0.9em; color: #333; margin-bottom: 8px; line-height: 1.6; }
  .model-card .en {
    font-size: 1em; font-family: 'Times New Roman', serif; color: #1a1a2e;
    line-height: 1.8; padding: 8px; background: rgba(255,255,255,0.7); border-radius: 8px;
  }
  .model-card .en .hl { background: #f6d365; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

  /* Chunk display */
  .chunks { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
  .chunk {
    background: #fff; border: 2px solid #f6d365; border-radius: 8px; padding: 6px 10px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; font-weight: bold;
  }

  /* Fill-in-blank */
  .fb-sentence {
    font-size: 1em; font-family: 'Times New Roman', serif; line-height: 2.2; padding: 10px;
    background: #fff; border-radius: 8px; margin: 6px 0;
  }
  .fb-blank {
    display: inline-block; min-width: 60px; border-bottom: 3px solid #e63946; margin: 0 3px;
    text-align: center; padding: 2px 4px; color: transparent; cursor: default;
  }
  .fb-blank.reveal { color: #e63946; border-color: #52b788; font-weight: bold; }

  .word-bank { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .wb-word {
    background: #e8f0fe; border: 2px solid #0f3460; border-radius: 8px; padding: 5px 10px;
    font-size: 0.8em; cursor: pointer; user-select: none; transition: all 0.15s;
  }
  .wb-word:hover { background: #d0e0ff; }
  .wb-word.used { opacity: 0.3; pointer-events: none; }

  /* Dictation */
  .dict-area { margin: 10px 0; }
  .dict-cn { font-size: 0.95em; color: #333; text-align: center; margin-bottom: 8px; line-height: 1.6; }
  .dict-hint { font-size: 0.75em; color: #999; text-align: center; margin-bottom: 6px; }
  .dict-hint span { background: #e8f0fe; padding: 2px 8px; border-radius: 10px; margin: 2px; display: inline-block; }

  /* Compare view */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
  .compare-col { border-radius: 10px; padding: 10px; font-size: 0.8em; line-height: 1.7; }
  .compare-col.my { background: #e8f0fe; font-family: 'Times New Roman', serif; }
  .compare-col.model { background: #d4edda; font-family: 'Times New Roman', serif; }
  .compare-col h5 { font-size: 0.85em; margin-bottom: 4px; }
  .diff { background: #ffc9c9; padding: 1px 3px; border-radius: 3px; }
  .good { background: #b7e4c7; padding: 1px 3px; border-radius: 3px; }

  /* Score */
  .score-display {
    text-align: center; font-size: 1.5em; margin: 6px 0;
  }

  /* Textarea */
  textarea {
    width: 100%; height: 100px; border: 2px solid #ddd; border-radius: 10px; padding: 12px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; line-height: 1.7; resize: vertical; outline: none;
  }
  textarea:focus { border-color: #0f3460; }
  textarea.correct { border-color: #52b788; background: #f0fff4; }
  textarea.wrong { border-color: #ff6b6b; background: #fff5f5; }

  /* Buttons */
  .btn {
    display: inline-block; padding: 10px 22px; border-radius: 24px; font-size: 0.82em;
    font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #0f3460; color: #fff; }
  .btn-success { background: #2d6a4f; color: #fff; }
  .btn-warning { background: #f6d365; color: #1a1a2e; }
  .btn-outline { background: #fff; color: #0f3460; border: 2px solid #0f3460; }
  .btn-sm { padding: 5px 14px; font-size: 0.7em; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* Review section */
  .review-item {
    background: #f8f9fa; border-radius: 10px; padding: 10px; margin-bottom: 8px;
    border-left: 4px solid #f6d365;
  }
  .review-item .r-cn { font-size: 0.82em; color: #555; margin-bottom: 4px; }
  .review-item .r-en { font-size: 0.82em; font-family: 'Times New Roman', serif; color: #1a1a2e; }

  /* Responsive */
  @media (max-width: 400px) {
    .calendar { gap: 3px; }
    .day-box { border-radius: 8px; font-size: 0.5em; }
    .card { padding: 12px; }
    .compare { grid-template-columns: 1fr; }
    .mem-steps { gap: 3px; }
    .mem-step-tab { font-size: 0.62em; padding: 6px 2px; }
  }
</style>
</head>

<div class="container">
  <h1><span class="icon">📝</span> 英语作文打卡挑战</h1>

  <div class="progress-wrap">

  <div class="stars" id="stars">☆☆☆☆☆☆☆☆☆☆☆☆☆☆</div>

    <div id="taskContent"></div>

</div>

<script>

const DAYS = [

  { // Day 1

        chunks: ['I strongly advise you', 'to drink more water,', 'because it is good for your health.'],
        blanks: ['strongly', 'advise', 'health'] },
      { cn: '凡事都有两面性。',
        model: 'Every coin has two sides.',

  { // Day 3

// ==================== STATE ====================
const STORAGE_KEY = 'essay_checkin_v5';
let state = loadState();

function defaultState() {
  return {
    completed: {},      // { day: timestamp }
    sentences: {},      // { day: [user answers for each sentence dictation] }
    essays: {},         // { day: "essay text" }
    sentenceDone: {},   // { day: { sentenceIndex: true } } — per-sentence completion
  };
}

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== RENDER ====================
let activeDay = null;
let activeStepIndex = 0; // 0=背诵, 1=填空, 2=默写, 3=核对
const STEP_LABELS = ['📖 背诵记忆', '🧩 填空练习', '✍️ 默写输出', '✅ 核对答案'];

function getTodayIndex() {
  for (let i = 0; i < 14; i++) { if (!state.completed[i]) return i; }
  return 13;
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const today = getTodayIndex();
  for (let i = 0; i < 14; i++) {
    const box = document.createElement('div');
    box.className = 'day-box';
    const done = !!state.completed[i];
    const locked = i > today && !done;
    const isToday = i === today && !done;
    if (done) box.classList.add('done');
    else if (isToday) box.classList.add('today');
    else if (locked) box.classList.add('locked');
    box.innerHTML = `<span>D${i + 1}</span>${locked ? '<span>🔒</span>' : ''}`;
    if (!locked || done) box.onclick = () => selectDay(i);
    cal.appendChild(box);
  }
}

function updateProgress() {
  const count = Object.keys(state.completed).length;
  document.getElementById('progressBar').style.width = (count / 14 * 100) + '%';
  document.getElementById('progressLabel').textContent = count + '/14';
  let s = '';
  for (let i = 0; i < 14; i++) s += state.completed[i] ? '⭐' : '☆';
  document.getElementById('stars').textContent = s;
}

function selectDay(index) {
  activeDay = index;
  activeStepIndex = 0;
  renderCalendar();
  renderTask(index);
}

function renderTask(index) {
  const day = DAYS[index];
  const done = !!state.completed[index];
  const card = document.getElementById('taskCard');
  document.getElementById('taskTitle').textContent = 'Day ' + (index + 1) + ' · ' + day.topic;

  let html = `<div class="tag">${day.template}</div>`;
  html += `<div class="goal">🎯 ${day.goal}</div>`;

  if (done) {
    html += doneView(index);
  } else {
    if (day.reviewDays && day.reviewDays.length > 0) {
      html += renderReview(day.reviewDays);
    }
    if (day.type === 'sentences') {
      html += renderSentenceStudy(index, day);
    } else {
      html += renderEssayPractice(index, day);
    }
  }

  document.getElementById('taskContent').innerHTML = html;
  bindEvents(index, day);
}

function doneView(index) {
  let h = `<div style="background:#d4edda;border-radius:12px;padding:14px;text-align:center;color:#2d6a4f;">
    ✅ 已完成！${new Date(state.completed[index]).toLocaleString('zh-CN')}
    <br><button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="selectDay(${index})">🔁 重新练习</button>
  </div>`;
  if (state.essays[index]) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">📄 你的作文：</h4>
      <p style="font-size:0.78em;white-space:pre-wrap;line-height:1.8;font-family:'Times New Roman',serif;">${esc(state.essays[index])}</p>
    </div>`;
  } else if (state.sentences[index]) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">📝 你的默写：</h4>`;
    DAYS[index].sentences.forEach((s, si) => {
      const usr = (state.sentences[index] || [])[si] || '';
      h += `<div style="margin-bottom:6px;"><span style="color:#999;font-size:0.7em;">${si+1}. ${s.cn}</span><br><span style="font-family:'Times New Roman',serif;font-size:0.78em;">${esc(usr)}</span></div>`;
    });
    h += `</div>`;
  }
  return h;
}

// ==================== REVIEW (复习之前学过的句子) ====================
function renderReview(dayIndices) {
  let reviewSentences = [];
  dayIndices.forEach(di => {
    if (DAYS[di] && DAYS[di].sentences) {
      DAYS[di].sentences.forEach(s => reviewSentences.push(s));
    }
  });
  if (reviewSentences.length === 0) return '';

  let h = `<div style="background:#fff8e1;border-radius:10px;padding:10px;margin-bottom:10px;border-left:4px solid #f6d365;">
    <h4 style="font-size:0.8em;color:#856404;margin-bottom:6px;">📚 复习已背句型（点击查看答案）</h4>`;
  reviewSentences.forEach((s, i) => {
    h += `<div class="review-item" id="review_${i}">
      <div class="r-cn">${s.cn}</div>
      <div class="r-en" id="reviewEn_${i}" style="display:none;">${esc(s.model)}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:4px;" onclick="document.getElementById('reviewEn_${i}').style.display='block';this.style.display='none';">👀 显示答案</button>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ==================== SENTENCE STUDY (3-step: 背诵→填空→默写→核对) ====================
function renderSentenceStudy(index, day) {
  let h = '';

  // Step tabs
  h += `<div class="mem-steps">`;
  STEP_LABELS.forEach((l, si) => {
    let cls = 'mem-step-tab';
    if (si === activeStepIndex) cls += ' active';
    if (si < activeStepIndex) cls += ' done';
    h += `<div class="${cls}" onclick="activeStepIndex=${si};renderTask(${index})">${l}</div>`;
  });
  h += `</div>`;

  // Show current sentence indicator
  const totalS = day.sentences.length;
  h += `<div style="text-align:center;font-size:0.75em;color:#999;margin-bottom:8px;">
    共 ${totalS} 个句型 | 当前第 <span id="curSentNum">1</span> 个
  </div>`;

  // Render current sentence based on step
  const curIdx = window._curSentIdx || 0;
  const s = day.sentences[curIdx];
  h += `<div id="sentenceWorkArea">`;

  if (activeStepIndex === 0) {
    // STEP 0: 背诵记忆 — show model sentence, chunks, phrase highlights
    h += renderMemorize(s);
  } else if (activeStepIndex === 1) {
    // STEP 1: 填空练习 — fill in key words
    h += renderFillBlank(s, index, curIdx);
  } else if (activeStepIndex === 2) {
    // STEP 2: 默写 — only Chinese + keyword hints
    h += renderDictation(s, index, curIdx);
  } else if (activeStepIndex === 3) {
    // STEP 3: 核对 — compare user answer with model
    h += renderCompare(s, index, curIdx);
  }

  h += `</div>`;

  // Navigation buttons
  h += `<div class="btn-row">`;
  if (curIdx > 0) {
    h += `<button class="btn btn-outline btn-sm" onclick="_curSentIdx=${curIdx-1};activeStepIndex=0;renderTask(${index})">⬅ 上一句</button>`;
  }
  h += `<button class="btn btn-primary btn-sm" onclick="advanceStep(${index}, ${curIdx})" id="btnAdvance">${
    activeStepIndex === 3 ? '➡ 下一句' : '下一步 ➡'
  }</button>`;
  h += `</div>`;

  return h;
}

function renderMemorize(s) {
  let h = `<div class="model-card">
    <div class="cn">🇨🇳 ${s.cn}</div>
    <div class="en">${highlightPhrase(esc(s.model))}</div>
  </div>`;
  // Chunks
  if (s.chunks) {
    h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">📦 分块记忆：</div>`;
    h += `<div class="chunks">`;
    s.chunks.forEach(c => { h += `<div class="chunk">${esc(c)}</div>`; });
    h += `</div>`;
  }
  h += `<p style="text-align:center;font-size:0.75em;color:#999;margin-top:8px;">👆 大声朗读3遍，试着盖住英文，看中文说出英文句。</p>`;
  return h;
}

function renderFillBlank(s, index, curIdx) {
  // Create fill-in-blank version
  let words = s.blanks || [];
  let sentence = s.model;
  let fbHtml = sentence;
  words.forEach(w => {
    fbHtml = fbHtml.replace(new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b'), `<span class="fb-blank" data-word="${esc(w)}">____</span>`);
  });

  let h = `<div class="model-card"><div class="cn">🇨🇳 ${s.cn}</div></div>`;
  h += `<div class="fb-sentence">${fbHtml}</div>`;
  h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">👇 点击下方单词填入空格</div>`;
  // Shuffled word bank
  let shuffled = [...words].sort(() => Math.random() - 0.5);
  h += `<div class="word-bank" id="wordBank">`;
  shuffled.forEach(w => {
    h += `<span class="wb-word" data-word="${esc(w)}" onclick="fillBlank(this)">${esc(w)}</span>`;
  });
  h += `</div>`;
  h += `<div style="text-align:center;margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="revealAllBlanks()">👀 显示答案</button></div>`;
  return h;
}

function fillBlank(el) {
  const word = el.dataset.word;
  // Find first empty blank
  const blanks = document.querySelectorAll('.fb-blank:not(.reveal)');
  for (let b of blanks) {
    if (b.dataset.word === word && !b.classList.contains('reveal')) {
      b.textContent = word;
      b.classList.add('reveal');
      el.classList.add('used');
      // Check if all filled
      if (document.querySelectorAll('.fb-blank:not(.reveal)').length === 0) {
        setTimeout(() => { if (confirm('全部填完！太棒了！✅ 准备进入默写了吗？')) advanceStepDirect(); }, 300);
      }
      return;
    }
  }
}

function revealAllBlanks() {
  document.querySelectorAll('.fb-blank').forEach(b => {
    b.textContent = b.dataset.word;
    b.classList.add('reveal');
  });
  document.querySelectorAll('.wb-word').forEach(w => w.classList.add('used'));
}

function renderDictation(s, index, curIdx) {
  let h = `<div class="dict-area">
    <div class="dict-cn">🇨🇳 ${s.cn}</div>`;
  if (s.chunks) {
    h += `<div class="dict-hint">💡 关键词提示：`;
    // Show first word of each chunk as hint
    s.chunks.forEach(c => {
      const firstWord = c.trim().split(/\s+/)[0].replace(/[,.]/g, '');
      h += `<span>${firstWord}</span>`;
    });
    h += `</div>`;
  }
  h += `<textarea id="dictText" placeholder="不看原文，凭记忆写出英文句子..."></textarea>`;
  h += `<div class="btn-row">
    <button class="btn btn-outline btn-sm" id="btnPeek">偷偷看一眼 👀</button>
    <button class="btn btn-primary btn-sm" id="btnCheckDict">✅ 提交核对</button>
  </div>`;
  h += `<div id="peekArea" style="display:none;margin-top:8px;">
    <div class="model-card"><div class="en">${esc(s.model)}</div></div>
  </div>`;
  h += `<div id="dictResult"></div>`;
  h += `</div>`;
  return h;
}

function renderCompare(s, index, curIdx) {
  const userAnswer = (state.sentences[index] || [])[curIdx] || '';
  let h = `<div class="compare">
    <div class="compare-col my">
      <h5>✏️ 我的默写</h5>
      <div>${esc(userAnswer) || '<em style="color:#999;">（未填写）</em>'}</div>
    </div>
    <div class="compare-col model">
      <h5>📋 标准答案</h5>
      <div>${esc(s.model)}</div>
    </div>
  </div>`;
  // Simple diff score
  if (userAnswer) {
    const score = simpleScore(userAnswer, s.model);
    h += `<div class="score-display">${score >= 80 ? '🎉' : score >= 50 ? '👍' : '💪'} 相似度: ${score}%</div>`;
    if (score >= 90) h += `<p style="text-align:center;color:#2d6a4f;font-size:0.85em;">完美！你已经记住这个句子了！</p>`;
    else if (score >= 60) h += `<p style="text-align:center;color:#f6a623;font-size:0.85em;">还不错！再练习一下拼写吧。</p>`;
    else h += `<p style="text-align:center;color:#e63946;font-size:0.85em;">差距较大，建议回第一步重新背诵。</p>`;
  }
  return h;
}

function simpleScore(user, model) {
  const uWords = user.toLowerCase().replace(/[.,;!?]/g, '').split(/\s+/).filter(Boolean);
  const mWords = model.toLowerCase().replace(/[.,;!?]/g, '').split(/\s+/).filter(Boolean);
  if (uWords.length === 0) return 0;
  let match = 0;
  const mSet = new Set(mWords);
  uWords.forEach(w => { if (mSet.has(w)) match++; });
  return Math.round((match / Math.max(uWords.length, mWords.length)) * 100);
}

function highlightPhrase(text) {
  // Highlight common phrases
  const phrases = [
    'If I were you', 'I would', 'not only', 'but also', 'as long as', 'give up',
    'in my opinion', 'as far as', 'take care of', 'look up', 'look forward to',
    'be supposed to', 'had better', 'why not', 'first of all', 'in the end',
    'make a difference', 'around the corner', 'instead of', 'depend on',
    'be interested in', 'because of', 'in front of', 'along the way',
    'it is important', 'a good way to', 'advise you to', 'manage to',
    'by myself', 'stay up late', 'a balanced diet', 'keep healthy',
    'volunteer to', 'take action', 'learn from', 'be willing to',
  ];
  let result = text;
  phrases.forEach(p => {
    const escaped = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="hl">$1</span>');
  });
  return result;
}

function advanceStep(index, curIdx) {
  const day = DAYS[index];
  const maxSent = day.sentences.length;

  if (activeStepIndex === 2) {
    // Coming from dictation, save answer first
    const ta = document.getElementById('dictText');
    if (ta) {
      if (!state.sentences[index]) state.sentences[index] = [];
      state.sentences[index][curIdx] = ta.value.trim();
      saveState();
    }
  }

  if (activeStepIndex < 3) {
    activeStepIndex++;
    renderTask(index);
  } else {
    // Move to next sentence or complete
    if (curIdx < maxSent - 1) {
      window._curSentIdx = curIdx + 1;
      activeStepIndex = 0;
      renderTask(index);
    } else {
      // All sentences done
      completeDay(index);
    }
  }
}

function advanceStepDirect() {
  // Called from fill-blank completion
  activeStepIndex++;
  renderTask(activeDay);
}

// ==================== ESSAY PRACTICE ====================
function renderEssayPractice(index, day) {
  let h = '';
  if (day.sentences && day.sentences.length > 0) {
    day.sentences.forEach((s, si) => {
      h += `<div class="model-card" style="text-align:left;margin-bottom:8px;">
        <div class="cn" style="text-align:left;font-size:0.82em;">${esc(s.cn)}</div>
        <div class="en" style="text-align:left;font-size:0.9em;">${highlightPhrase(esc(s.model))}</div>
        <p style="font-size:0.7em;color:#999;margin-top:4px;">👆 先背熟这个句型，再写作文</p>
      </div>`;
    });
    // Quick dictation check
    h += `<div style="margin-bottom:10px;text-align:center;">
      <button class="btn btn-outline btn-sm" onclick="toggleQuickDict(${index})">📝 快速默写检测</button>
    </div>`;
    h += `<div id="quickDictArea" style="display:none;"></div>`;
  }

  h += `<div style="background:#fff8e1;border-radius:10px;padding:12px;margin:10px 0;border-left:4px solid #f6d365;">
    <h4 style="font-size:0.85em;color:#856404;">✍️ 今日作文</h4>
    <p style="white-space:pre-wrap;font-size:0.82em;color:#333;">${esc(day.essayPrompt)}</p>
  </div>`;

  h += `<textarea id="essayText" placeholder="在这里写你的作文..."></textarea>`;
  h += `<div class="btn-row">
    <button class="btn btn-outline btn-sm" id="btnEssayHint">💡 写作框架</button>
    <button class="btn btn-success" id="btnSubmitEssay">✅ 提交并打卡</button>
  </div>`;
  h += `<div id="essayHintBox" style="display:none;background:#e8f0fe;border-radius:8px;padding:10px;margin-top:8px;font-size:0.8em;line-height:1.8;color:#0f3460;">📋 ${esc(day.essayHint)}</div>`;
  return h;
}

function toggleQuickDict(index) {
  const area = document.getElementById('quickDictArea');
  if (area.style.display === 'none') {
    const day = DAYS[index];
    let h = '';
    (day.sentences || []).forEach((s, si) => {
      h += `<div style="margin-bottom:8px;">
        <p style="font-size:0.8em;color:#333;">${si+1}. ${s.cn}</p>
        <textarea id="qd_${si}" style="height:40px;font-size:0.78em;" placeholder="默写..."></textarea>
      </div>`;
    });
    h += `<button class="btn btn-primary btn-sm" onclick="checkQuickDict(${index})">✅ 检查答案</button>`;
    h += `<div id="qdResult"></div>`;
    area.innerHTML = h;
    area.style.display = 'block';
  } else {
    area.style.display = 'none';
  }
}

function checkQuickDict(index) {
  const day = DAYS[index];
  let h = '';
  (day.sentences || []).forEach((s, si) => {
    const ua = (document.getElementById('qd_' + si)?.value || '').trim();
    const score = simpleScore(ua, s.model);
    const emoji = score >= 80 ? '✅' : score >= 50 ? '⚠️' : '❌';
    h += `<div style="font-size:0.78em;margin:4px 0;">${emoji} ${si+1}. 相似度 ${score}% — 答案：${esc(s.model)}</div>`;
  });
  document.getElementById('qdResult').innerHTML = h;
}

// ==================== EVENT BINDING ====================
function bindEvents(index, day) {
  if (state.completed[index]) return;

  if (day.type === 'sentences') {
    // Peek button
    const peekBtn = document.getElementById('btnPeek');
    if (peekBtn) peekBtn.onclick = () => { document.getElementById('peekArea').style.display = 'block'; };
    // Check dictation
    const checkBtn = document.getElementById('btnCheckDict');
    if (checkBtn) checkBtn.onclick = () => { advanceStep(index, window._curSentIdx || 0); };
  } else {
    // Essay hint
    const hintBtn = document.getElementById('btnEssayHint');
    if (hintBtn) hintBtn.onclick = () => {
      const box = document.getElementById('essayHintBox');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    };
    // Submit essay
    const submitBtn = document.getElementById('btnSubmitEssay');
    if (submitBtn) submitBtn.onclick = () => {
      const ta = document.getElementById('essayText');
      if (!ta || !ta.value.trim()) { alert('请先写完作文再提交哦！📝'); return; }
      state.essays[index] = ta.value.trim();
      completeDay(index);
    };
  }
}

function completeDay(index) {
  state.completed[index] = Date.now();
  saveState();
  updateProgress();
  renderCalendar();
  renderTask(index);
  launchConfetti();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;pointer-events:none;z-index:999;top:0;left:0;width:100%;height:100%;';
  document.body.appendChild(container);
  const colors = ['#f6d365','#fda085','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#ff6b6b'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-${Math.random()*40+10}px;width:10px;height:10px;border-radius:3px;background:${colors[Math.floor(Math.random()*colors.length)]};animation:fall ${Math.random()*1.2+1.2}s ease-out forwards;animation-delay:${Math.random()*0.8}s;`;
    container.appendChild(p);
  }
  setTimeout(() => container.remove(), 3000);
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ==================== INIT ====================
function init() {
  window._curSentIdx = 0;
  updateProgress();
  renderCalendar();
  selectDay(getTodayIndex());
}
init();
</script>
