<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>5大作文模板 · 10天句型熟记</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; padding: 12px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  h1 { text-align: center; color: #fff; font-size: 1.3em; margin: 8px 0 2px; }
  h1 .icon { font-size: 1.3em; }
  .sub { text-align: center; color: rgba(255,255,255,0.7); font-size: 0.8em; margin-bottom: 10px; }

  /* Day navigator */
  .day-nav {
    display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px;
  }
  .nav-arrow {
    background: rgba(255,255,255,0.15); border: none; color: #fff; width: 40px; height: 40px;
    border-radius: 50%; font-size: 1em; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: background 0.2s;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.3); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .day-label { color: #fff; font-size: 0.95em; font-weight: bold; }

  /* Card */
  .card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
  .card h2 { font-size: 1.05em; color: #1a1a2e; margin-bottom: 2px; }
  .card .tag { display: inline-block; background: #f6d365; color: #1a1a2e; padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; margin-bottom: 8px; }
  .card .goal { font-size: 0.85em; color: #666; margin-bottom: 10px; line-height: 1.6; }

  /* Memory step tabs */
  .mem-steps { display: flex; gap: 6px; margin-bottom: 12px; }
  .mem-step-tab {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 10px; font-size: 0.7em; font-weight: bold;
    background: #eee; color: #999; transition: all 0.2s;
  }
  .mem-step-tab.active { background: #0f3460; color: #fff; }
  .mem-step-tab.done { background: #d4edda; color: #2d6a4f; }

  /* Model card */
  .model-card {
    background: linear-gradient(135deg, #fff5f5, #fff8e1); border: 2px solid #f6d365; border-radius: 14px;
    padding: 14px; margin-bottom: 10px; text-align: center;
  }
  .model-card .cn { font-size: 0.9em; color: #333; margin-bottom: 8px; line-height: 1.6; }
  .model-card .en {
    font-size: 1em; font-family: 'Times New Roman', serif; color: #1a1a2e;
    line-height: 1.8; padding: 8px; background: rgba(255,255,255,0.7); border-radius: 8px;
  }
  .model-card .en .hl { background: #f6d365; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

  /* Role badge */
  .role-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7em;
    font-weight: bold; margin-right: 6px; vertical-align: middle;
  }
  .role-badge.open { background: #d0e8ff; color: #1d5fa3; }
  .role-badge.body { background: #ffe8cc; color: #b8680a; }
  .role-badge.close { background: #d4edda; color: #1e6f3f; }
  .role-badge.pro { background: #e8d0ff; color: #6b1fa3; }
  .role-badge.opp { background: #ffe0e0; color: #b81a1a; }

  /* Pattern frame display */
  .pattern-box {
    background: linear-gradient(135deg, #e8f0fe, #f0e8ff); border: 2px solid #4facfe;
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; text-align: center;
  }
  .pattern-box .label { font-size: 0.72em; color: #4facfe; font-weight: bold; margin-bottom: 4px; }
  .pattern-box .frame {
    font-size: 1em; font-family: 'Times New Roman', serif; color: #0f3460;
    line-height: 1.8; font-weight: bold;
  }
  .pattern-box .frame .hl { background: #ffe082; padding: 2px 5px; border-radius: 4px; }

  /* Chunk display */
  .chunks { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 8px 0; }
  .chunk {
    background: #fff; border: 2px solid #f6d365; border-radius: 8px; padding: 6px 10px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; font-weight: bold;
  }

  /* Fill-in-blank */
  .fb-sentence {
    font-size: 1em; font-family: 'Times New Roman', serif; line-height: 2.2; padding: 10px;
    background: #fff; border-radius: 8px; margin: 6px 0;
  }
  .fb-blank {
    display: inline-block; min-width: 60px; border-bottom: 3px solid #e63946; margin: 0 3px;
    text-align: center; padding: 2px 4px; color: transparent; cursor: default;
  }
  .fb-blank.reveal { color: #e63946; border-color: #52b788; font-weight: bold; }

  .word-bank { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .wb-word {
    background: #e8f0fe; border: 2px solid #0f3460; border-radius: 8px; padding: 5px 10px;
    font-size: 0.8em; cursor: pointer; user-select: none; transition: all 0.15s;
  }
  .wb-word:hover { background: #d0e0ff; }
  .wb-word.used { opacity: 0.3; pointer-events: none; }

  /* Dictation */
  .dict-area { margin: 10px 0; }
  .dict-cn { font-size: 0.95em; color: #333; text-align: center; margin-bottom: 8px; line-height: 1.6; }
  .dict-hint { font-size: 0.75em; color: #999; text-align: center; margin-bottom: 6px; }
  .dict-hint span { background: #e8f0fe; padding: 2px 8px; border-radius: 10px; margin: 2px; display: inline-block; }

  /* Compare view */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
  .compare-col { border-radius: 10px; padding: 10px; font-size: 0.8em; line-height: 1.7; }
  .compare-col.my { background: #e8f0fe; font-family: 'Times New Roman', serif; }
  .compare-col.model { background: #d4edda; font-family: 'Times New Roman', serif; }
  .compare-col h5 { font-size: 0.85em; margin-bottom: 4px; }

  /* Score */
  .score-display {
    text-align: center; font-size: 1.5em; margin: 6px 0;
  }

  /* Textarea */
  textarea {
    width: 100%; height: 100px; border: 2px solid #ddd; border-radius: 10px; padding: 12px;
    font-size: 0.9em; font-family: 'Times New Roman', serif; line-height: 1.7; resize: vertical; outline: none;
  }
  textarea:focus { border-color: #0f3460; }

  /* Handwriting canvas */
  .hw-wrap {
    position: relative; background: #fff; border: 2px solid #c0c0c0; border-radius: 10px;
    overflow: hidden; margin: 8px 0; box-shadow: inset 0 0 8px rgba(0,0,0,0.05);
    touch-action: none;
  }
  .hw-canvas {
    display: block; width: 100%; cursor: crosshair;
  }
  .hw-tools {
    display: flex; gap: 8px; align-items: center; justify-content: center; padding: 6px 10px;
    background: #f8f9fa; border-top: 1px solid #eee; flex-wrap: wrap;
  }
  .hw-tools .hw-btn {
    background: #fff; border: 1px solid #ddd; border-radius: 16px; padding: 6px 14px;
    font-size: 0.72em; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .hw-tools .hw-btn:hover { background: #e8f0fe; border-color: #0f3460; }
  .hw-tools .hw-btn.danger:hover { background: #ffe0e0; border-color: #e63946; }
  .hw-tools .pen-size-label { font-size: 0.68em; color: #666; }
  .hw-tools input[type=range] { width: 60px; accent-color: #0f3460; }
  .hw-toggle-row {
    text-align: center; margin-top: 6px;
  }
  .hw-toggle-row button {
    background: none; border: none; color: #0f3460; font-size: 0.72em; cursor: pointer;
    text-decoration: underline; font-family: inherit;
  }

  /* Buttons */
  .btn {
    display: inline-block; padding: 10px 22px; border-radius: 24px; font-size: 0.82em;
    font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #0f3460; color: #fff; }
  .btn-success { background: #2d6a4f; color: #fff; }
  .btn-outline { background: #fff; color: #0f3460; border: 2px solid #0f3460; }
  .btn-sm { padding: 5px 14px; font-size: 0.7em; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* Review section */
  .review-item {
    background: #f8f9fa; border-radius: 10px; padding: 10px; margin-bottom: 8px;
    border-left: 4px solid #f6d365;
  }
  .review-item .r-cn { font-size: 0.82em; color: #555; margin-bottom: 4px; }
  .review-item .r-en { font-size: 0.82em; font-family: 'Times New Roman', serif; color: #1a1a2e; }

  /* Responsive */
  @media (max-width: 400px) {
    .card { padding: 12px; }
    .compare { grid-template-columns: 1fr; }
    .mem-steps { gap: 3px; }
    .mem-step-tab { font-size: 0.62em; padding: 6px 2px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><span class="icon">📝</span> 5大作文模板万能句</h1>
  <div class="sub">10天熟记20个万能句型 · 建议信 / 议论文 / 记叙文 / 人物 / 通知</div>

  <div class="day-nav" id="dayNav">
    <button class="nav-arrow" id="btnPrev" title="前一天">◀</button>
    <span class="day-label" id="dayLabel">第 1/10 天</span>
    <button class="nav-arrow" id="btnNext" title="后一天">▶</button>
  </div>

  <div class="card" id="taskCard">
    <h2 id="taskTitle">Day 1 · 模板1 · 建议信（上）</h2>
    <div id="taskContent"></div>
  </div>
</div>

<script>
// ==================== 10-DAY PLAN DATA ====================
// Each sentence: cn (中文), model (英文), chunks (分块记忆), blanks (挖空词), role (首段/主体/结尾等)

const DAYS = [
  // ===== Day 1: 建议信 — 首段/主体 =====
  {
    topic: '模板1 · 建议信（上）', template: '建议信',
    goal: '背熟建议信的开头和主体句型：如何回应来信 + 如何分条给建议',
    type: 'sentences',
    sentences: [
      { cn: '很高兴收到你的来信，询问如何学好英语的建议。',
        pattern: "I'm sorry to hear that... / I'm glad to receive your letter...",
        model: "I'm glad to receive your letter asking for advice on how to learn English well.",
        chunks: ["I'm glad to receive your letter", "asking for advice on", "how to learn English well."],
        blanks: ['glad', 'receive', 'advice', 'learn'],
        role: '首段' },
      { cn: '首先，你最好听英文歌。其次，为什么不读一些简单的英文故事呢？',
        pattern: "First of all, you'd better... / Secondly, why not...? / What's more, ...",
        model: "First of all, you'd better listen to English songs. Secondly, why not read some simple English stories?",
        chunks: ["First of all,", "you'd better listen to English songs.", "Secondly, why not", "read some simple English stories?"],
        blanks: ['First of all', 'better', 'Secondly', 'simple'],
        role: '主体' },
    ],
  },

  // ===== Day 2: 建议信 — 结尾（巩固）=====
  {
    topic: '模板1 · 建议信（下）', template: '建议信',
    goal: '背熟建议信结尾句型，复习前一天的句型。',
    type: 'sentences',
    sentences: [
      { cn: '希望我的建议对你有帮助。',
        pattern: 'I hope my advice will be helpful.',
        model: 'I hope my advice will be helpful.',
        chunks: ['I hope', 'my advice', 'will be helpful.'],
        blanks: ['hope', 'advice', 'helpful'],
        role: '结尾' },
      { cn: '只要你坚持练习，你一定会进步的。',
        pattern: 'As long as you..., you will...',
        model: 'As long as you keep practicing, you will make progress.',
        chunks: ['As long as you keep practicing,', 'you will make progress.'],
        blanks: ['As long as', 'keep', 'practicing', 'progress'],
        role: '结尾' },
    ],
    reviewDays: [0],
  },

  // ===== Day 3: 议论文 — 首段/正方/反方 =====
  {
    topic: '模板2 · 议论文（上）', template: '议论文',
    goal: '背熟议论文的开头、正方和反方句型，学会"先陈述观点再反驳"的结构。',
    type: 'sentences',
    sentences: [
      { cn: '如今，学生是否应该使用手机已经成为一个热门话题。',
        pattern: 'These days, ... has become a hot topic.',
        model: 'These days, whether students should use mobile phones has become a hot topic.',
        chunks: ['These days,', 'whether students should use mobile phones', 'has become a hot topic.'],
        blanks: ['These days', 'whether', 'mobile phones', 'hot topic'],
        role: '首段' },
      { cn: '有些人认为手机能帮助学生快速查阅信息。',
        pattern: 'Some people think that... They believe that...',
        model: 'Some people think that mobile phones help students look up information quickly.',
        chunks: ['Some people think that', 'mobile phones help students', 'look up information quickly.'],
        blanks: ['think', 'help', 'look up', 'quickly'],
        role: '正方' },
      { cn: '但也有人争辩说，手机会分散学生的学习注意力。',
        pattern: 'However, others hold the opposite view. They argue that...',
        model: 'However, others argue that mobile phones may distract students from their study.',
        chunks: ['However, others argue that', 'mobile phones may distract students', 'from their study.'],
        blanks: ['However', 'argue', 'distract', 'study'],
        role: '反方' },
    ],
  },

  // ===== Day 4: 议论文-己见 + 记叙文-开头 =====
  {
    topic: '模板2+3 · 议论文（下）+ 记叙文（上）', template: '议论文+记叙文',
    goal: '议论文收尾句型 + 记叙文开头句型，学会引出自己的经历。',
    type: 'sentences',
    sentences: [
      { cn: '就我而言，学生可以使用手机，但必须在严格规定下。',
        pattern: "In my opinion / As far as I'm concerned, I agree with...",
        model: "As far as I'm concerned, students can use phones, but only under strict rules.",
        chunks: ["As far as I'm concerned,", "students can use phones,", "but only under strict rules."],
        blanks: ['As far as', 'concerned', 'phones', 'strict rules'],
        role: '己见' },
      { cn: '我仍然记得我第一次参加篮球比赛的那一天。',
        pattern: 'Last..., I had an unforgettable experience. / I still remember the day when...',
        model: 'I still remember the day when I took part in a basketball game for the first time.',
        chunks: ['I still remember the day', 'when I took part in a basketball game', 'for the first time.'],
        blanks: ['remember', 'took part in', 'basketball', 'first time'],
        role: '首段' },
    ],
    reviewDays: [2],
  },

  // ===== Day 5: 记叙文 — 经过/结尾 =====
  {
    topic: '模板3 · 记叙文（下）', template: '记叙文',
    goal: '背熟记叙文的经过和结尾句型，学会按时间顺序描述经历。',
    type: 'sentences',
    sentences: [
      { cn: '一开始我很紧张。然后，队友们鼓励了我。之后我越打越好，最后我们赢了！',
        pattern: 'At first, ... Then, ... After that, ... Finally, ...',
        model: 'At first, I was very nervous. Then, my teammates encouraged me. After that, I played better and better. Finally, we won!',
        chunks: ['At first, I was very nervous.', 'Then, my teammates encouraged me.', 'After that, I played better and better.', 'Finally, we won!'],
        blanks: ['At first', 'nervous', 'encouraged', 'Finally'],
        role: '主体' },
      { cn: '我从这次经历中学到了很多——团队合作可以让不可能变为可能。',
        pattern: 'I learned a lot from this experience. / This is really a day to remember.',
        model: 'I learned a lot from this experience — teamwork can make the impossible possible.',
        chunks: ['I learned a lot from this experience', '— teamwork can make', 'the impossible possible.'],
        blanks: ['learned', 'experience', 'teamwork', 'impossible'],
        role: '结尾' },
    ],
    reviewDays: [3],
  },

  // ===== Day 6: 人物描写 — 开头/性格/事迹 =====
  {
    topic: '模板4 · 人物描写（上）', template: '人物描写',
    goal: '背熟人物描写的开头和性格句式，学会 not only...but also 和 What impresses me 等高级表达。',
    type: 'sentences',
    sentences: [
      { cn: '我最敬佩的人是我妈妈，她不仅是一位勤奋的护士，也是一位充满关爱的母亲。',
        pattern: 'The person I admire most is..., who is not only...but also...',
        model: 'The person I admire most is my mother, who is not only a hardworking nurse but also a caring mother.',
        chunks: ['The person I admire most is my mother,', 'who is not only a hardworking nurse', 'but also a caring mother.'],
        blanks: ['admire', 'not only', 'but also', 'caring'],
        role: '首段' },
      { cn: '她是个热心肠的人。最让我印象深刻的是，她从不抱怨工作的辛苦。',
        pattern: 'He/She is a ... person. What impresses me most is that...',
        model: 'She is a warm-hearted person. What impresses me most is that she never complains about her hard work.',
        chunks: ['She is a warm-hearted person.', 'What impresses me most is that', 'she never complains about her hard work.'],
        blanks: ['warm-hearted', 'impresses', 'complains', 'hard work'],
        role: '主体' },
    ],
    reviewDays: [0, 2],
  },

  // ===== Day 7: 人物描写 — 事迹/影响 =====
  {
    topic: '模板4 · 人物描写（下）', template: '人物描写',
    goal: '学会用具体事迹支撑人物形象，并用"It is...who..."强调句型收尾。',
    type: 'sentences',
    sentences: [
      { cn: '她曾经彻夜不眠地照顾一位重症病人。',
        pattern: 'He/She once... For example, ...',
        model: 'She once stayed up the whole night to take care of a seriously ill patient.',
        chunks: ['She once stayed up the whole night', 'to take care of', 'a seriously ill patient.'],
        blanks: ['once', 'stayed up', 'take care of', 'seriously'],
        role: '主体' },
      { cn: '她对我影响很大。正是她让我意识到，责任感是最重要的品质。',
        pattern: 'He/She has a great influence on me. It is he/she who...',
        model: 'She has a great influence on me. It is she who makes me realize that responsibility is the most important quality.',
        chunks: ['She has a great influence on me.', 'It is she who makes me realize', 'that responsibility is the most important quality.'],
        blanks: ['influence', 'realize', 'responsibility', 'quality'],
        role: '结尾' },
    ],
    reviewDays: [5],
  },

  // ===== Day 8: 活动通知 — 开头/内容/注意事项 =====
  {
    topic: '模板5 · 活动通知（上）', template: '活动通知',
    goal: '背熟活动通知的完整结构：开头说明目的、中间列活动内容、结尾提醒注意事项。',
    type: 'sentences',
    sentences: [
      { cn: '我写信是要告诉你下周日我们班去科技馆参观的安排。',
        pattern: "I'm writing to tell you about... / Here is the plan for...",
        model: "I'm writing to tell you about our class trip to the Science Museum next Sunday.",
        chunks: ["I'm writing to tell you about", 'our class trip to the Science Museum', 'next Sunday.'],
        blanks: ['writing', 'tell', 'trip', 'Science Museum'],
        role: '首段' },
      { cn: '首先，我们早上8点在校门口集合。然后，我们坐大巴去那里。此外，我们还将在附近公园野餐。',
        pattern: 'To begin with, we will... Then, we are going to... Besides, ...',
        model: 'To begin with, we will meet at the school gate at 8:00 a.m. Then, we are going to take a bus there. Besides, we will have a picnic lunch in the park nearby.',
        chunks: ['To begin with, we will meet at the school gate at 8:00 a.m.', 'Then, we are going to take a bus there.', 'Besides, we will have a picnic lunch in the park nearby.'],
        blanks: ['To begin with', 'meet', 'take a bus', 'Besides', 'picnic'],
        role: '主体' },
      { cn: '请记得穿舒适的鞋子并带一瓶水。',
        pattern: "Please remember to... / Don't forget to...",
        model: 'Please remember to wear comfortable shoes and bring a bottle of water.',
        chunks: ['Please remember to', 'wear comfortable shoes', 'and bring a bottle of water.'],
        blanks: ['remember', 'comfortable', 'bring', 'bottle'],
        role: '结尾' },
    ],
    reviewDays: [1, 4],
  },

  // ===== Day 9: 活动通知-结尾 + 前四个模板复习 =====
  {
    topic: '模板5 · 活动通知（下）+ 综合复习', template: '活动通知+复习',
    goal: '学完最后一个结尾句型，然后回顾模板1-4的3个核心句型，查漏补缺。',
    type: 'sentences',
    sentences: [
      { cn: '我相信我们会玩得很开心。期待你的到来！',
        pattern: "I'm sure we will have a great time. / Looking forward to your coming.",
        model: "I'm sure we will have a great time. Looking forward to your coming!",
        chunks: ["I'm sure we will have a great time.", 'Looking forward to your coming!'],
        blanks: ['sure', 'great time', 'Looking forward', 'coming'],
        role: '结尾' },
      { cn: '（复习·建议信）很高兴收到你的来信，询问如何学好英语的建议。',
        pattern: "I'm sorry to hear that... / I'm glad to receive your letter...",
        model: "I'm glad to receive your letter asking for advice on how to learn English well.",
        chunks: ["I'm glad to receive your letter", "asking for advice on", "how to learn English well."],

// ==================== STATE ====================
const STORAGE_KEY = 'essay_checkin_10day_v1';
let state = loadState();

function defaultState() {
  return {
    completed: {},
    sentences: {},
    sentenceDone: {},
  };
}

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== RENDER ====================
let activeDay = null;
let activeStepIndex = 0;
const STEP_LABELS = ['📖 背诵记忆', '🧩 填空练习', '✍️ 默写输出', '✅ 核对答案'];
const TOTAL_DAYS = 10;

// ==================== DAY NAVIGATION ====================
function goToDay(index) {
  if (index < 0 || index >= TOTAL_DAYS) return;
  activeDay = index;
  activeStepIndex = 0;
  window._curSentIdx = 0;
  renderDayNav();
  renderTask(index);
}

function renderDayNav() {
  document.getElementById('dayLabel').textContent = '第 ' + (activeDay + 1) + '/' + TOTAL_DAYS + ' 天';
  document.getElementById('btnPrev').disabled = activeDay <= 0;
  document.getElementById('btnNext').disabled = activeDay >= TOTAL_DAYS - 1;
}

// ==================== TASK RENDERING ====================
function renderTask(index) {
  const day = DAYS[index];
  const done = !!state.completed[index];
  const card = document.getElementById('taskCard');
  document.getElementById('taskTitle').textContent = 'Day ' + (index + 1) + ' · ' + day.topic;

  let html = `<div class="tag">${day.template}</div>`;
  html += `<div class="goal">🎯 ${day.goal}</div>`;

  if (done) {
    html += doneView(index);
  } else {
    if (day.reviewDays && day.reviewDays.length > 0) {
      html += renderReview(day.reviewDays);
    }
    html += renderSentenceStudy(index, day);
  }

  document.getElementById('taskContent').innerHTML = html;
  bindEvents(index, day);
}

function doneView(index) {
  const hwData = state.handwriting && state.handwriting[index];
  let h = `<div style="background:#d4edda;border-radius:12px;padding:14px;text-align:center;color:#2d6a4f;">
    ✅ 已完成！${new Date(state.completed[index]).toLocaleString('zh-CN')}
    <br><button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="delete state.completed[${index}];delete state.sentences[${index}];delete state.handwriting[${index}];saveState();goToDay(${index})">🔁 重新练习</button>
  </div>`;
  const sentences = DAYS[index].sentences;
  // Show handwriting images
  if (hwData && hwData.some(img => img)) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">✍️ 我的手写：</h4>`;
    sentences.forEach((s, si) => {
      if (hwData[si]) {
        h += `<div style="margin-bottom:6px;"><span style="color:#999;font-size:0.7em;">${si+1}. ${roleBadge(s.role)}${s.cn}</span><br><img src="${hwData[si]}" style="max-width:100%;border:1px solid #ddd;border-radius:6px;background:#fff;" alt="handwriting ${si+1}"></div>`;
      }
    });
    h += `</div>`;
  }
  // Show typed answers
  if (state.sentences[index]) {
    h += `<div style="margin-top:8px;background:#f8f9fa;border-radius:10px;padding:10px;">
      <h4 style="font-size:0.82em;color:#0f3460;">📝 你的默写：</h4>`;
    sentences.forEach((s, si) => {
      const usr = (state.sentences[index] || [])[si] || '';
      if (usr) {
        h += `<div style="margin-bottom:6px;"><span style="color:#999;font-size:0.7em;">${si+1}. ${roleBadge(s.role)}${s.cn}</span><br><span style="font-family:'Times New Roman',serif;font-size:0.78em;">${esc(usr)}</span></div>`;
      }
    });
    h += `</div>`;
  }
  return h;
}

// ==================== REVIEW ====================
function renderReview(dayIndices) {
  let reviewSentences = [];
  dayIndices.forEach(di => {
    if (DAYS[di] && DAYS[di].sentences) {
      DAYS[di].sentences.forEach(s => reviewSentences.push(s));
    }
  });
  if (reviewSentences.length === 0) return '';

  let h = `<div style="background:#fff8e1;border-radius:10px;padding:10px;margin-bottom:10px;border-left:4px solid #f6d365;">
    <h4 style="font-size:0.8em;color:#856404;margin-bottom:6px;">📚 复习已背句型（点击查看答案）</h4>`;
  reviewSentences.forEach((s, i) => {
    h += `<div class="review-item" id="review_${i}">
      <div class="r-cn">${roleBadge(s.role)}${s.cn}</div>
      <div class="r-en" id="reviewEn_${i}" style="display:none;">${esc(s.model)}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:4px;" onclick="document.getElementById('reviewEn_${i}').style.display='block';this.style.display='none';">👀 显示答案</button>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ==================== SENTENCE STUDY ====================
function renderSentenceStudy(index, day) {
  let h = '';

  // Step tabs
  h += `<div class="mem-steps">`;
  STEP_LABELS.forEach((l, si) => {
    let cls = 'mem-step-tab';
    if (si === activeStepIndex) cls += ' active';
    if (si < activeStepIndex) cls += ' done';
    h += `<div class="${cls}" onclick="activeStepIndex=${si};renderTask(${index})">${l}</div>`;
  });
  h += `</div>`;

  const totalS = day.sentences.length;
  const curIdx = window._curSentIdx || 0;
  const s = day.sentences[curIdx];

  h += `<div style="text-align:center;font-size:0.75em;color:#999;margin-bottom:8px;">
    共 ${totalS} 个句型 | ${roleBadge(s.role)} 当前第 ${curIdx + 1} 个
  </div>`;

  h += `<div id="sentenceWorkArea">`;

  if (activeStepIndex === 0) {
    h += renderMemorize(s);
  } else if (activeStepIndex === 1) {
    h += renderFillBlank(s, index, curIdx);
  } else if (activeStepIndex === 2) {
    h += renderDictation(s, index, curIdx);
  } else if (activeStepIndex === 3) {
    h += renderCompare(s, index, curIdx);
  }

  h += `</div>`;

  // Navigation
  h += `<div class="btn-row">`;
  if (curIdx > 0) {
    h += `<button class="btn btn-outline btn-sm" onclick="_curSentIdx=${curIdx-1};activeStepIndex=0;renderTask(${index})">⬅ 上一句</button>`;
  }
  h += `<button class="btn btn-primary btn-sm" onclick="advanceStep(${index}, ${curIdx})" id="btnAdvance">${
    activeStepIndex === 3 ? '➡ 下一句' : '下一步 ➡'
  }</button>`;
  h += `</div>`;

  return h;
}

function renderMemorize(s) {
  let h = '';
  // Pattern box — show the structural frame first
  if (s.pattern) {
    h += `<div class="pattern-box">
      <div class="label">📐 句型框架（先记住这个结构！）</div>
      <div class="frame">${highlightPhrase(esc(s.pattern))}</div>
    </div>`;
  }
  h += `<div class="model-card">
    <div class="cn">${roleBadge(s.role)}🇨🇳 ${s.cn}</div>
    <div class="en">${highlightPhrase(esc(s.model))}</div>
  </div>`;
  if (s.chunks) {
    h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">📦 分块记忆：</div>`;
    h += `<div class="chunks">`;
    s.chunks.forEach(c => { h += `<div class="chunk">${esc(c)}</div>`; });
    h += `</div>`;
  }
  h += `<p style="text-align:center;font-size:0.75em;color:#999;margin-top:8px;">👆 大声朗读3遍，试着盖住英文，看中文说出英文句。</p>`;
  return h;
}

function renderFillBlank(s, index, curIdx) {
  let words = s.blanks || [];
  let sentence = s.model;
  let fbHtml = sentence;
  words.forEach(w => {
    fbHtml = fbHtml.replace(new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b'), `<span class="fb-blank" data-word="${esc(w)}">____</span>`);
  });

  let h = `<div class="model-card"><div class="cn">${roleBadge(s.role)}🇨🇳 ${s.cn}</div></div>`;
  h += `<div class="fb-sentence">${fbHtml}</div>`;
  h += `<div style="text-align:center;font-size:0.72em;color:#999;margin:4px 0;">👇 点击下方单词填入空格</div>`;
  let shuffled = [...words].sort(() => Math.random() - 0.5);
  h += `<div class="word-bank" id="wordBank">`;
  shuffled.forEach(w => {
    h += `<span class="wb-word" data-word="${esc(w)}" onclick="fillBlank(this)">${esc(w)}</span>`;
  });
  h += `</div>`;
  h += `<div style="text-align:center;margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="revealAllBlanks()">👀 显示答案</button></div>`;
  return h;
}

function fillBlank(el) {
  const word = el.dataset.word;
  const blanks = document.querySelectorAll('.fb-blank:not(.reveal)');
  for (let b of blanks) {
    if (b.dataset.word === word && !b.classList.contains('reveal')) {
      b.textContent = word;
      b.classList.add('reveal');
      el.classList.add('used');
      if (document.querySelectorAll('.fb-blank:not(.reveal)').length === 0) {
        setTimeout(() => { if (confirm('全部填完！太棒了！✅ 准备进入默写了吗？')) advanceStepDirect(); }, 300);
      }
      return;
    }
  }
}

function revealAllBlanks() {
  document.querySelectorAll('.fb-blank').forEach(b => {
    b.textContent = b.dataset.word;
    b.classList.add('reveal');
  });
  document.querySelectorAll('.wb-word').forEach(w => w.classList.add('used'));
}

function renderDictation(s, index, curIdx) {
  let h = `<div class="dict-area">
    <div class="dict-cn">${roleBadge(s.role)}🇨🇳 ${s.cn}</div>`;
  if (s.chunks) {
    h += `<div class="dict-hint">💡 关键词提示：`;
    s.chunks.forEach(c => {
      const firstWord = c.trim().split(/\s+/)[0].replace(/[,.]/g, '');
      h += `<span>${firstWord}</span>`;
    });
    h += `</div>`;
  }
  h += `<div class="hw-wrap" id="hwWrap">
    <canvas class="hw-canvas" id="hwCanvas"></canvas>
    <div class="hw-tools">
      <button class="hw-btn" id="hwUndo" title="撤销">↩ 撤销</button>
      <button class="hw-btn danger" id="hwClear" title="清除">🗑 清除</button>
      <span class="pen-size-label">笔粗</span>
      <input type="range" id="hwPenSize" min="1" max="6" value="3" step="0.5">
      <span class="pen-size-label"><span id="hwSizeLabel">3</span>px</span>
      <button class="hw-btn" id="hwPenColor" title="切换颜色" style="width:24px;height:24px;border-radius:50%;background:#1a1a2e;padding:0;min-width:0;"></button>
    </div>
  </div>`;
  h += `<div class="hw-toggle-row"><button id="btnSwitchTyping">⌨ 切换到打字模式</button></div>`;
  h += `<div id="textAreaSlot" style="display:none;margin-top:8px;">
    <textarea id="dictText" placeholder="不看原文，凭记忆写出英文句子..."></textarea>
  </div>`;
  h += `<div class="btn-row">
    <button class="btn btn-outline btn-sm" id="btnPeek">偷偷看一眼 👀</button>
    <button class="btn btn-primary btn-sm" id="btnCheckDict">✅ 提交核对</button>
  </div>`;
  h += `<div id="peekArea" style="display:none;margin-top:8px;">
    <div class="model-card"><div class="en">${esc(s.model)}</div></div>
  </div>`;
  h += `<div id="dictResult"></div>`;
  h += `</div>`;
  return h;
}

function renderCompare(s, index, curIdx) {
  const userAnswer = (state.sentences[index] || [])[curIdx] || '';
  const hwImg = (state.handwriting && state.handwriting[index]) ? state.handwriting[index][curIdx] : null;

  // Show handwriting image if available
  if (hwImg) {
    let h = `<div style="text-align:center;margin-bottom:8px;">
      <h5 style="font-size:0.82em;color:#666;margin-bottom:4px;">✍️ 我的手写</h5>
      <img src="${hwImg}" style="max-width:100%;border:2px solid #c0c0c0;border-radius:10px;background:#fff;" alt="handwriting">
    </div>`;
    h += `<div class="model-card" style="margin-top:8px;">
      <div class="cn">📋 标准答案 ${roleBadge(s.role)}</div>
      <div class="en">${esc(s.model)}</div>
    </div>`;
    return h;
  }

  // Text comparison (fallback)
  let h = `<div class="compare">
    <div class="compare-col my">
      <h5>✏️ 我的默写</h5>
      <div>${esc(userAnswer) || '<em style="color:#999;">（未填写）</em>'}</div>
    </div>
    <div class="compare-col model">
      <h5>📋 标准答案 ${roleBadge(s.role)}</h5>
      <div>${esc(s.model)}</div>
    </div>
  </div>`;
  if (userAnswer) {
    const score = simpleScore(userAnswer, s.model);
    h += `<div class="score-display">${score >= 80 ? '🎉' : score >= 50 ? '👍' : '💪'} 相似度: ${score}%</div>`;
    if (score >= 90) h += `<p style="text-align:center;color:#2d6a4f;font-size:0.85em;">完美！你已经记住这个句子了！</p>`;
    else if (score >= 60) h += `<p style="text-align:center;color:#f6a623;font-size:0.85em;">还不错！再练习一下拼写吧。</p>`;
    else h += `<p style="text-align:center;color:#e63946;font-size:0.85em;">差距较大，建议回第一步重新背诵。</p>`;
  }
  return h;
}

function simpleScore(user, model) {
  const uWords = user.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  const mWords = model.toLowerCase().replace(/[.,;!?—]/g, '').split(/\s+/).filter(Boolean);
  if (uWords.length === 0) return 0;
  let match = 0;
  const mSet = new Set(mWords);
  uWords.forEach(w => { if (mSet.has(w)) match++; });
  return Math.round((match / Math.max(uWords.length, mWords.length)) * 100);
}

function highlightPhrase(text) {
  const phrases = [
    "I'm glad to", 'receive your letter', 'asking for advice', 'how to learn',
    "you'd better", 'why not', 'First of all', 'As long as',
    'These days', 'has become a hot topic', 'Some people think that',
    'However, others argue that', 'As far as', "I'm concerned",
    'I still remember the day when', 'took part in', 'for the first time',
    'At first', 'After that', 'Finally', 'learned a lot',
    'teamwork can make', 'the impossible possible',
    'The person I admire most', 'not only', 'but also',
    'What impresses me most', 'warm-hearted',
    'stayed up', 'take care of', 'seriously ill',
    'has a great influence on me', 'It is she who',
    "I'm writing to tell you", 'To begin with',
    'Please remember to', 'Looking forward to',
  ];
  let result = text;
  phrases.forEach(p => {
    const escaped = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="hl">$1</span>');
  });
  return result;
}

function advanceStep(index, curIdx) {
  const day = DAYS[index];
  const maxSent = day.sentences.length;

  if (activeStepIndex === 2) {
    // Save handwriting canvas as image
    const canvas = document.getElementById('hwCanvas');
    if (canvas && !isEmptyCanvas(canvas)) {
      if (!state.handwriting) state.handwriting = {};
      if (!state.handwriting[index]) state.handwriting[index] = [];
      state.handwriting[index][curIdx] = canvas.toDataURL('image/png');
    }
    // Also save textarea if visible
    const slot = document.getElementById('textAreaSlot');
    const ta = document.getElementById('dictText');
    if (slot && slot.style.display !== 'none' && ta) {
      if (!state.sentences[index]) state.sentences[index] = [];
      state.sentences[index][curIdx] = ta.value.trim();
    }
    saveState();
  }

  if (activeStepIndex < 3) {
    activeStepIndex++;
    renderTask(index);
  } else {
    if (curIdx < maxSent - 1) {
      window._curSentIdx = curIdx + 1;
      activeStepIndex = 0;
      renderTask(index);
    } else {
      completeDay(index);
    }
  }
}

function advanceStepDirect() {
  activeStepIndex++;
  renderTask(activeDay);
}

// ==================== UTILS ====================
function roleBadge(role) {
  if (!role) return '';
  const clsMap = { '首段': 'open', '主体': 'body', '结尾': 'close', '正方': 'pro', '反方': 'opp', '己见': 'pro', '开头': 'open', '经过': 'body', '性格': 'pro', '事迹': 'body', '影响': 'close', '内容': 'body', '注意事项': 'close' };
  const cls = clsMap[role] || 'body';
  return `<span class="role-badge ${cls}">${role}</span>`;
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;pointer-events:none;z-index:999;top:0;left:0;width:100%;height:100%;';
  document.body.appendChild(container);
  const colors = ['#f6d365','#fda085','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#ff6b6b'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-${Math.random()*40+10}px;width:10px;height:10px;border-radius:3px;background:${colors[Math.floor(Math.random()*colors.length)]};animation:fall ${Math.random()*1.2+1.2}s ease-out forwards;animation-delay:${Math.random()*0.8}s;`;
    container.appendChild(p);
  }
  setTimeout(() => container.remove(), 3000);
}

// ==================== HANDWRITING ====================
let hwUndoStack = [];
let hwDrawing = false;
let hwPenColor = '#1a1a2e';
let hwPenSize = 3;

function initHandwriting() {
  const canvas = document.getElementById('hwCanvas');
  if (!canvas) return;

  // Reset undo stack for new sentence
  hwUndoStack = [];

  const wrap = document.getElementById('hwWrap');
  const w = wrap.clientWidth - 4;
  const h = 180;
  canvas.width = w * window.devicePixelRatio;
  canvas.height = h * window.devicePixelRatio;
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  drawPaperLines(ctx, w, h);
  saveSnapshot(canvas);

  canvas.addEventListener('pointerdown', (e) => {
    hwDrawing = true;
    saveSnapshot(canvas);
    const pos = getCanvasPos(canvas, e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!hwDrawing) return;
    e.preventDefault();
    const pos = getCanvasPos(canvas, e);
    ctx.strokeStyle = hwPenColor;
    ctx.lineWidth = hwPenSize;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  });

  canvas.addEventListener('pointerup', () => { hwDrawing = false; });
  canvas.addEventListener('pointerleave', () => { hwDrawing = false; });
  canvas.addEventListener('pointercancel', () => { hwDrawing = false; });

  // Toolbar buttons
  document.getElementById('hwUndo').onclick = () => undoStroke(canvas);
  document.getElementById('hwClear').onclick = () => {
    clearCanvas(canvas);
    saveSnapshot(canvas);
  };
  document.getElementById('hwPenSize').oninput = (e) => {
    hwPenSize = parseFloat(e.target.value);
    document.getElementById('hwSizeLabel').textContent = hwPenSize;
  };
  document.getElementById('hwPenColor').onclick = function() {
    const colors = ['#1a1a2e', '#e63946', '#2d6a4f', '#1d5fa3'];
    const cur = colors.indexOf(hwPenColor);
    hwPenColor = colors[(cur + 1) % colors.length];
    this.style.background = hwPenColor;
  };

  // Toggle typing mode
  document.getElementById('btnSwitchTyping').onclick = () => {
    const wrap = document.getElementById('hwWrap');
    const slot = document.getElementById('textAreaSlot');
    const btn = document.getElementById('btnSwitchTyping');
    if (wrap.style.display === 'none') {
      wrap.style.display = 'block';
      slot.style.display = 'none';
      btn.innerHTML = '⌨ 切换到打字模式';
      initHandwriting();
    } else {
      wrap.style.display = 'none';
      slot.style.display = 'block';
      btn.innerHTML = '✍️ 切换到手写模式';
    }
  };
}

function getCanvasPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / window.devicePixelRatio / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / window.devicePixelRatio / rect.height),
  };
}

function drawPaperLines(ctx, w, h) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#c8e0f0';
  ctx.lineWidth = 1;
  const lineSpacing = 28;
  for (let y = lineSpacing; y < h; y += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  // Red margin line
  ctx.strokeStyle = '#f4a0a0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(28, 0);
  ctx.lineTo(28, h);
  ctx.stroke();
}

function saveSnapshot(canvas) {
  hwUndoStack.push(canvas.toDataURL());
  if (hwUndoStack.length > 30) hwUndoStack.shift();
}

function undoStroke(canvas) {
  if (hwUndoStack.length <= 1) return;
  hwUndoStack.pop();
  const img = new Image();
  img.onload = () => {
    const ctx = canvas.getContext('2d');
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.drawImage(img, 0, 0, w, h);
  };
  img.src = hwUndoStack[hwUndoStack.length - 1];
}

function clearCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  drawPaperLines(ctx, w, h);
}

function isEmptyCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  // Check if any non-white, non-line pixel exists
  for (let i = 0; i < pixelData.length; i += 4) {
    const r = pixelData[i], g = pixelData[i+1], b = pixelData[i+2];
    // Skip white bg and light blue lines and red margin
    if (r === 255 && g === 255 && b === 255) continue;
    if (r >= 190 && g >= 220 && b >= 235) continue; // light blue lines
    if (r >= 235 && g >= 150 && b >= 150 && r <= 250) continue; // red margin
    return false;
  }
  return true;
}

// ==================== EVENT BINDING ====================
function bindEvents(index, day) {
  if (state.completed[index]) return;

  const peekBtn = document.getElementById('btnPeek');
  if (peekBtn) peekBtn.onclick = () => { document.getElementById('peekArea').style.display = 'block'; };
  const checkBtn = document.getElementById('btnCheckDict');
  if (checkBtn) checkBtn.onclick = () => { advanceStep(index, window._curSentIdx || 0); };

  // Init handwriting canvas if visible
  if (activeStepIndex === 2 && document.getElementById('hwCanvas')) {
    initHandwriting();
  }
}

function completeDay(index) {
  state.completed[index] = Date.now();
  saveState();
  // Reset handwriting stack
  hwUndoStack = [];
  renderTask(index);
  launchConfetti();
}

// ==================== INIT ====================
function init() {
  window._curSentIdx = 0;
  document.getElementById('btnPrev').onclick = () => goToDay(activeDay - 1);
  document.getElementById('btnNext').onclick = () => goToDay(activeDay + 1);
  goToDay(0);
}
init();
</script>
